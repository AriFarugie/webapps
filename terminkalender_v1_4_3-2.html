      </div>`:''}
    </div>
    ${renderWaitlistStats()}`;
}

function renderWaitlistStats(){
  const wl=loadWaitlist();
  if(!wl.length) return '';

  const today=new Date();
  const toMs=d=>new Date(d).getTime();
  const daysWaiting=e=>e.date?Math.floor((today-new Date(e.date))/(86400000)):null;

  // Status counts
  const statusCounts=Object.keys(WL_STATUS).map(k=>({k,label:WL_STATUS[k].label,cls:WL_STATUS[k].cls,v:wl.filter(e=>e.status===k).length}));
  const maxSC=Math.max(...statusCounts.map(x=>x.v),1);

  // Avg wait for all active (not declined)
  const active=wl.filter(e=>e.status!=='declined');
  const allDays=active.map(daysWaiting).filter(d=>d!==null);
  const avgWait=allDays.length?Math.round(allDays.reduce((a,b)=>a+b,0)/allDays.length):0;

  // Avg wait until first contact (contacted or further)
  const contacted=wl.filter(e=>['contacted','no_reply','scheduled'].includes(e.status)&&e.date&&e.lastContact);
  const contactDays=contacted.map(e=>Math.floor((toMs(e.lastContact)-toMs(e.date))/86400000)).filter(d=>d>=0);
  const avgContact=contactDays.length?Math.round(contactDays.reduce((a,b)=>a+b,0)/contactDays.length):null;

  // Longest waiting uncontacted
  const uncontacted=wl.filter(e=>e.status==='new'&&e.date);
  uncontacted.sort((a,b)=>a.date.localeCompare(b.date));
  const longest=uncontacted[0];
  const longestDays=longest?daysWaiting(longest):null;

  // Conversion rate: scheduled / total
  const scheduled=wl.filter(e=>e.status==='scheduled').length;
  const convRate=wl.length?Math.round(scheduled/wl.length*100):0;

  // Priority breakdown
  const hiPrio=wl.filter(e=>e.priority==='high'&&e.status==='new').length;

  // Kontaktweg (Erstkontakt) aufschlüsseln
  const cmCounts=Object.keys(WL_CONTACT).map(k=>({k,label:WL_CONTACT[k].label,icon:WL_CONTACT[k].icon,v:wl.filter(e=>e.contactMethod===k).length})).filter(x=>x.v>0);
  const cmNone=wl.filter(e=>!e.contactMethod).length;

  return`
  <div style="border-top:1px solid var(--border);margin-top:4px;padding-top:16px;margin-bottom:8px">
    <div style="font-size:14px;font-weight:500;color:var(--text);margin-bottom:12px">Warteliste</div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-card-title">Status-Übersicht</div>
        ${statusCounts.filter(s=>s.v>0).map(s=>`
          <div class="bar-row">
            <div class="bar-lbl" style="width:130px;text-align:right;font-size:11px">${s.label}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round(s.v/maxSC*100)}%;background:var(--purple)"></div></div>
            <div class="bar-num">${s.v}</div>
          </div>`).join('')}
        <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:12px;color:var(--text2)">
          Gesamt: <strong>${wl.length}</strong> &nbsp;·&nbsp; Aktiv: <strong>${active.length}</strong>
          ${hiPrio>0?`&nbsp;·&nbsp; <span style="color:var(--red-text)">⬆ ${hiPrio} hohe Priorität noch nicht kontaktiert</span>`:''}
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-card-title">Wartezeiten</div>
        <div class="drow"><span class="drow-lbl">Ø Wartezeit (aktiv)</span><span class="drow-val">${waitLabel(avgWait)}</span></div>
        <div class="drow"><span class="drow-lbl">Ø Zeit bis Kontakt</span><span class="drow-val">${avgContact!==null?waitLabel(avgContact):'–'}</span></div>
        <div class="drow"><span class="drow-lbl">Terminvereinbarungsrate</span><span class="drow-val">${convRate}% (${scheduled}/${wl.length})</span></div>
        ${longest?`<div class="drow"><span class="drow-lbl">Längste Wartezeit</span><span class="drow-val" style="color:${longestDays>90?'var(--amber-text)':'var(--text)'}"><strong>${esc(longest.name.split(' ')[0])}</strong> · ${waitLabel(longestDays)}</span></div>`:''}
      </div>
      ${cmCounts.length?`<div class="stat-card">
        <div class="stat-card-title">Kontaktweg (Erstkontakt)</div>
        ${cmCounts.map(c=>`<div class="drow"><span class="drow-lbl">${c.icon} ${c.label}</span><span class="drow-val">${c.v}</span></div>`).join('')}
        ${cmNone?`<div class="drow"><span class="drow-lbl" style="color:var(--text3)">keine Angabe</span><span class="drow-val" style="color:var(--text3)">${cmNone}</span></div>`:''}
      </div>`:''}
    </div>
  </div>`;
}

// ── Warteliste ────────────────────────────────────────────────────────────────
const WL_STATUS={
  new:{label:'Noch nicht kontaktiert',cls:'badge-wl-new'},
  contacted:{label:'Kontaktiert',cls:'badge-wl-contacted'},
  no_reply:{label:'Keine Antwort',cls:'badge-wl-no_reply'},
  scheduled:{label:'Termin vereinbart',cls:'badge-wl-scheduled'},
  declined:{label:'Abgesagt',cls:'badge-wl-declined'},
};
const WL_CONTACT={
  phone:{label:'Telefon',icon:'📞'},
  email:{label:'E-Mail',icon:'✉'},
  inperson:{label:'Persönlich',icon:'🤝'},
  other:{label:'Sonstige',icon:'•'},
};

function waitDays(dateStr){
  if(!dateStr)return null;
  const diff=Math.floor((new Date()-new Date(dateStr))/(1000*60*60*24));
  return diff;
}
function waitLabel(days){
  if(days===null)return'–';
  if(days<7)return`${days} Tage`;
  if(days<30)return`${Math.floor(days/7)} Woche${Math.floor(days/7)!==1?'n':''}`;
  if(days<365)return`${Math.floor(days/30)} Monat${Math.floor(days/30)!==1?'e':''}`;
  const y=Math.floor(days/365), m=Math.floor((days%365)/30);
  return`${y} Jahr${y!==1?'e':''}${m>0?` ${m} Mon.`:''}`;
}

function saveWLSort(v){localStorage.setItem('wlSort',v);}
function loadWLSort(){return localStorage.getItem('wlSort')||'prio_wartezeit';}
function renderWaitlist(filter='', statusFilter=''){
  const entries=loadWaitlist();
  const sf=statusFilter||document.getElementById('wl-filter-status')?.value||'';
  const fl=filter.toLowerCase();
  const sort=loadWLSort();
  const sel=document.getElementById('wl-sort');
  if(sel&&sel.value!==sort)sel.value=sort;

  let filtered=entries;
  if(sf) filtered=filtered.filter(e=>e.status===sf);
  if(fl) filtered=filtered.filter(e=>e.name.toLowerCase().includes(fl)||(e.phone||'').includes(fl)||(e.complaint||'').toLowerCase().includes(fl));

  const STATUS_ORDER={new:0,contacted:1,no_reply:2,scheduled:3,declined:4};
  const PRIO_ORDER={high:0,normal:1,low:2};

  if(sort==='prio_wartezeit'){
    filtered.sort((a,b)=>{
      const pd=PRIO_ORDER[a.priority||'normal']-PRIO_ORDER[b.priority||'normal'];
      if(pd!==0)return pd;
      return (a.date||'').localeCompare(b.date||'');
    });
  } else if(sort==='wartezeit'){
    filtered.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  } else if(sort==='name'){
    filtered.sort((a,b)=>a.name.split(',')[0].trim().toLowerCase().localeCompare(b.name.split(',')[0].trim().toLowerCase(),'de'));
  } else if(sort==='letzter_kontakt'){
    filtered.sort((a,b)=>{
      if(!a.lastContact&&!b.lastContact)return 0;
      if(!a.lastContact)return 1;
      if(!b.lastContact)return -1;
      return b.lastContact.localeCompare(a.lastContact);
    });
  } else if(sort==='status'){
    filtered.sort((a,b)=>{
      const sd=STATUS_ORDER[a.status||'new']-STATUS_ORDER[b.status||'new'];
      if(sd!==0)return sd;
      return (a.date||'').localeCompare(b.date||'');
    });
  }

  // Summary bar
  const counts={};
  Object.keys(WL_STATUS).forEach(k=>{counts[k]=entries.filter(e=>e.status===k).length});
  const summaryEl=document.getElementById('wl-summary');
  if(summaryEl) summaryEl.innerHTML=`<div style="display:flex;gap:6px;flex-wrap:wrap;font-size:12px">
    ${Object.entries(WL_STATUS).map(([k,v])=>counts[k]>0?`<span class="badge ${v.cls}" style="cursor:pointer" onclick="document.getElementById('wl-filter-status').value='${k}';renderWaitlist(document.getElementById('wl-search').value,'${k}')">${v.label}: ${counts[k]}</span>`:'').filter(Boolean).join('')}
    <span style="color:var(--text3)">Gesamt: ${entries.length}</span>
  </div>`;

  const el=document.getElementById('waitlist-entries');
  if(!el)return;
  if(!filtered.length){
    el.innerHTML=`<div class="empty">${entries.length?'Keine Einträge für diesen Filter.':'Noch keine Einträge. Klicke auf "+ Eintrag".'}</div>`;
    return;
  }

  el.innerHTML=filtered.map(e=>{
    const days=waitDays(e.date);
    const st=WL_STATUS[e.status||'new'];
    const isLong=days!==null&&days>90;
    const prio=e.priority||'normal';
    const cm=e.contactMethod&&WL_CONTACT[e.contactMethod]?WL_CONTACT[e.contactMethod]:null;
    return`<div onclick="editWaitlistEntry('${e.id}')" title="Zum Bearbeiten klicken" style="cursor:pointer;background:var(--surface);border:1px solid ${isLong&&e.status==='new'?'var(--amber)':'var(--border)'};border-radius:var(--radius);padding:12px 14px;margin-bottom:6px">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap">
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">
            <span style="font-size:14px;font-weight:500;color:var(--text)">${esc(e.name)}</span>
            ${prio==='high'?`<span class="badge-prio-high">⬆ Hoch</span>`:''}
            ${prio==='low'?`<span class="badge-prio-low">⬇ Niedrig</span>`:''}
            <span class="badge ${st.cls}">${st.label}</span>
            ${isLong&&e.status==='new'?`<span style="font-size:11px;color:var(--amber-text);background:var(--amber-bg);padding:1px 6px;border-radius:3px">⚠ Lange Wartezeit</span>`:''}
          </div>
          <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--text2)">
            ${e.phone?`<span>📞 ${esc(e.phone)}</span>`:''}
            ${e.email?`<span>✉ ${esc(e.email)}</span>`:''}
            <span>📅 Seit ${formatDate(e.date)} <strong style="color:var(--text)">(${waitLabel(days)})</strong></span>
            ${e.lastContact?`<span>Letzter Kontakt: ${formatDate(e.lastContact)}</span>`:''}
            ${cm?`<span>${cm.icon} Erstkontakt: ${cm.label}</span>`:''}
          </div>
          ${e.complaint?`<div style="margin-top:5px;font-size:12px;color:var(--text2)">${esc(e.complaint)}</div>`:''}
          ${e.notes?`<div style="margin-top:3px;font-size:11px;color:var(--text3);font-style:italic">${esc(e.notes)}</div>`:''}
        </div>
        <div style="display:flex;gap:4px;flex-shrink:0;align-items:center">
          ${e.status!=='scheduled'&&e.status!=='declined'?`<button onclick="event.stopPropagation();quickStatusWL('${e.id}')" style="background:none;border:1px solid var(--border);border-radius:5px;cursor:pointer;font-size:11px;padding:3px 8px;color:var(--text2);font-family:inherit;white-space:nowrap">Status ↓</button>`:''}
          ${e.status==='scheduled'?`<button onclick="event.stopPropagation();convertToPatient('${e.id}')" style="background:var(--teal-bg);border:1px solid var(--teal-text);border-radius:5px;cursor:pointer;font-size:11px;padding:3px 8px;color:var(--teal-text);font-family:inherit;white-space:nowrap">→ Als Patient</button>`:''}
          <button onclick="event.stopPropagation();editWaitlistEntry('${e.id}')" title="Bearbeiten" style="background:none;border:none;cursor:pointer;font-size:13px;padding:4px;color:var(--text2)">✏️</button>
          <button onclick="event.stopPropagation();deleteWaitlistEntry('${e.id}')" style="background:none;border:none;cursor:pointer;font-size:13px;padding:4px;color:var(--red-text)">✕</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function filterWaitlist(v){renderWaitlist(v);}

function quickStatusWL(id){
  const entries=loadWaitlist();
  const e=entries.find(x=>x.id===id);if(!e)return;
  const order=['new','contacted','no_reply','scheduled','declined'];
  const next=order[Math.min(order.indexOf(e.status||'new')+1,order.length-1)];
  const label=WL_STATUS[next].label;
  if(!confirm(`Status ändern zu: "${label}"?`))return;
  e.status=next;
  if(next==='contacted'||next==='no_reply') e.lastContact=todayStr();
  saveWaitlist(entries);renderWaitlist();showToast(`Status: ${label}`);
}

function convertToPatient(id){
  const e=loadWaitlist().find(x=>x.id===id);if(!e)return;
  if(!confirm(`"${e.name}" als Patient übernehmen?`))return;
  openNewPatient();
  document.getElementById('modal-patient-title').textContent='Patient aus Warteliste übernehmen';
  document.getElementById('pt-name').value=e.name;
  document.getElementById('pt-phone').value=e.phone||'';
  document.getElementById('pt-email').value=e.email||'';
  document.getElementById('pt-notes').value=[e.complaint,e.notes].filter(Boolean).join('\n');
  // store waitlist ID so savePatient can remove the entry after saving
  document.getElementById('pt-wl-source-id').value=id;
  document.getElementById('modal-patient').classList.remove('hidden');
  showToast('Daten übernommen — bitte ergänzen und speichern.');
}

function openNewWaitlistEntry(){
  document.getElementById('modal-wl-title').textContent='Neuer Wartelisten-Eintrag';
  ['wl-name','wl-phone','wl-email','wl-complaint','wl-notes','wl-last-contact'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('wl-date').value=todayStr();
  document.getElementById('wl-status').value='new';
  document.getElementById('wl-priority').value='normal';
  document.getElementById('wl-contact-method').value='';
  document.getElementById('wl-edit-id').value='';
  document.getElementById('modal-wl').classList.remove('hidden');
}

function editWaitlistEntry(id){
  const e=loadWaitlist().find(x=>x.id===id);if(!e)return;
  document.getElementById('modal-wl-title').textContent='Eintrag bearbeiten';
  document.getElementById('wl-name').value=e.name||'';
  document.getElementById('wl-phone').value=e.phone||'';
  document.getElementById('wl-email').value=e.email||'';
  document.getElementById('wl-date').value=e.date||todayStr();
  document.getElementById('wl-status').value=e.status||'new';
  document.getElementById('wl-priority').value=e.priority||'normal';
  document.getElementById('wl-contact-method').value=e.contactMethod||'';
  document.getElementById('wl-last-contact').value=e.lastContact||'';
  document.getElementById('wl-complaint').value=e.complaint||'';
  document.getElementById('wl-notes').value=e.notes||'';
  document.getElementById('wl-edit-id').value=id;
  document.getElementById('modal-wl').classList.remove('hidden');
}

function saveWaitlistEntry(){
  const name=document.getElementById('wl-name').value.trim();
  if(!name){alert('Bitte Name eingeben.');return;}
  const entries=loadWaitlist();
  const editId=document.getElementById('wl-edit-id').value;
  const data={
    name,
    phone:document.getElementById('wl-phone').value.trim(),
    email:document.getElementById('wl-email').value.trim(),
    date:document.getElementById('wl-date').value,
    status:document.getElementById('wl-status').value,
    priority:document.getElementById('wl-priority').value,
    contactMethod:document.getElementById('wl-contact-method').value,
    lastContact:document.getElementById('wl-last-contact').value,
    complaint:document.getElementById('wl-complaint').value.trim(),
    notes:document.getElementById('wl-notes').value.trim(),
  };
  if(editId){const i=entries.findIndex(x=>x.id===editId);if(i>=0)entries[i]={...entries[i],...data};}
  else entries.push({id:uid(),...data});
  saveWaitlist(entries);closeModal('modal-wl');renderWaitlist();
  showToast(editId?'Eintrag aktualisiert.':'Eintrag gespeichert.');
}

function deleteWaitlistEntry(id){
  if(!confirm('Eintrag löschen?'))return;
  saveWaitlist(loadWaitlist().filter(x=>x.id!==id));
  renderWaitlist();showToast('Eintrag gelöscht.');
}

// ── Export / Import ───────────────────────────────────────────────────────────
function exportData(){
  const data={
    version:1,
    exportedAt:new Date().toISOString(),
    patients:loadPatients(),
    appts:loadAppts(),
    groups:loadGroups(),
    waitlist:loadWaitlist(),
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const date=new Date().toISOString().slice(0,10);
  a.href=url;a.download=`terminkalender-backup-${date}.json`;
  a.click();URL.revokeObjectURL(url);
  showToast('Backup gespeichert.');
}

function importData(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data||typeof data!=='object'||!data.version||!Array.isArray(data.patients)||!Array.isArray(data.appts)){
        alert('Ungültige Backup-Datei.');input.value='';return;
      }
      const groups=Array.isArray(data.groups)?data.groups:[];
      const waitlist=Array.isArray(data.waitlist)?data.waitlist:[];
      const count=data.patients.length;
      const apptCount=data.appts.length;
      if(!confirm(`Backup vom ${formatDate(data.exportedAt?.slice(0,10))} laden?\n\n${count} Patienten, ${apptCount} Termine, ${waitlist.length} Wartelisten-Einträge\n\n⚠️ Bestehende Daten werden überschrieben.`)){
        input.value='';return;
      }
      savePatients(data.patients);
      saveAppts(data.appts);
      saveGroups(groups);
      saveWaitlist(waitlist);
      input.value='';
      renderMetrics();
      if(currentTab==='kalender')renderCal();
      if(currentTab==='heute')renderHeute();
      if(currentTab==='patienten'){renderPatients();renderGroups();}
      if(currentTab==='warteliste')renderWaitlist();
      if(currentTab==='statistik')renderStats();
      showToast(`Backup geladen: ${count} Patienten, ${apptCount} Termine.`);
    }catch(err){
      alert('Fehler beim Lesen der Datei. Bitte eine gültige Backup-Datei wählen.');
      input.value='';
    }
  };
  reader.readAsText(file);
}

// ── Modal helpers ─────────────────────────────────────────────────────────────
function closeModal(id){document.getElementById(id).classList.add('hidden')}
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.add('hidden')}));
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.overlay').forEach(o=>o.classList.add('hidden'))});

// ── Init ──────────────────────────────────────────────────────────────────────
// Erst Daten aus IndexedDB laden (inkl. einmaliger localStorage-Migration), dann rendern.
loadDB().then(()=>{
  renderMetrics();
  switchTab('heute');
  const sel=document.getElementById('patient-sort');
  if(sel)sel.value=loadPatientSort();
  const wlSel=document.getElementById('wl-sort');
  if(wlSel)wlSel.value=loadWLSort();
});

// ── Therapieantrag save ───────────────────────────────────────────────────────
function saveTA(patientId, key, done, date){
  const patients=loadPatients();
  const p=patients.find(x=>x.id===patientId);
  if(!p)return;
  if(!p.therapieantrag)p.therapieantrag={};
  p.therapieantrag[key]={done:!!done, date:date||null};
  savePatients(patients);
  showToast('Gespeichert.');
}

// ── Patient context menu ──────────────────────────────────────────────────────
function showPatientCtxMenu(e, patientId, apptId){
  e.stopPropagation();
  hidePatientCtxMenu();
  const menu=document.createElement('div');
  menu.id='patient-ctx-menu';
  menu.style.cssText=`position:fixed;z-index:9999;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 4px 16px rgba(0,0,0,.12);min-width:160px;overflow:hidden`;
  menu.innerHTML=`
    <div onclick="showPatient('${patientId}');hidePatientCtxMenu()" style="padding:10px 14px;cursor:pointer;font-size:13px;color:var(--text);display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)">
      <span>👤</span><span>Zur Akte</span>
    </div>
    <div onclick="editAppt('${apptId}');hidePatientCtxMenu()" style="padding:10px 14px;cursor:pointer;font-size:13px;color:var(--text);display:flex;align-items:center;gap:8px">
      <span>✏️</span><span>Termin bearbeiten</span>
    </div>`;
  menu.querySelectorAll('div').forEach(d=>{
    d.addEventListener('mouseenter',()=>d.style.background='var(--surface2)');
    d.addEventListener('mouseleave',()=>d.style.background='');
  });
  // Position near click
  const x=Math.min(e.clientX, window.innerWidth-180);
  const y=Math.min(e.clientY+4, window.innerHeight-100);
  menu.style.left=x+'px';
  menu.style.top=y+'px';
  document.body.appendChild(menu);
  setTimeout(()=>document.addEventListener('click',hidePatientCtxMenu,{once:true}),0);
}
function hidePatientCtxMenu(){
  const m=document.getElementById('patient-ctx-menu');
  if(m)m.remove();
}
</script>

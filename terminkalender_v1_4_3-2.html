<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terminkalender – Psychotherapie (v1.4.3)</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
:root{
  --bg:#f5f4f0;--surface:#ffffff;--surface2:#efefeb;--border:#e0dfd8;--border2:#c8c7be;
  --text:#1a1a18;--text2:#6b6b66;--text3:#9a9a94;
  --blue:#185FA5;--blue-bg:#e6f1fb;--blue-text:#0C447C;
  --teal:#0F6E56;--teal-bg:#e1f5ee;--teal-text:#085041;
  --amber:#BA7517;--amber-bg:#faeeda;--amber-text:#633806;
  --red:#A32D2D;--red-bg:#fcebeb;--red-text:#791F1F;
  --purple:#534AB7;--purple-bg:#eeedfe;--purple-text:#3C3489;
  --radius:8px;--radius-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1a1a18;--surface:#252522;--surface2:#2e2e2b;--border:#3a3a36;--border2:#4a4a46;
    --text:#f0efe8;--text2:#a0a09a;--text3:#6b6b66;
    --blue-bg:#0c2a4a;--blue-text:#85B7EB;
    --teal-bg:#052f24;--teal-text:#5DCAA5;
    --amber-bg:#2e1f06;--amber-text:#EF9F27;
    --red-bg:#2a0f0f;--red-text:#F09595;
    --purple-bg:#1e1b40;--purple-text:#AFA9EC;
  }
  /* Termin-Pills & Badges im Dunkelmodus an die dunkle Palette anpassen,
     damit sie nicht hell "leuchten" und genug Kontrast haben. */
  .appt-dot.et{background:var(--blue-bg);color:var(--blue-text)}
  .appt-dot.vt{background:var(--purple-bg);color:var(--purple-text)}
  .appt-dot.gt{background:var(--teal-bg);color:var(--teal-text)}
  .appt-dot.konsult{background:var(--amber-bg);color:var(--amber-text)}
  .appt-dot.amber{background:var(--amber-bg);color:var(--amber-text)}
  .appt-dot.pink{background:#3b1020;color:#f3a9c9}
  .appt-dot.phone{background:var(--teal-bg);color:var(--teal-text)}
  .appt-dot.noshow{background:var(--red-bg);color:var(--red-text)}
  .badge-wl-new{background:var(--surface2);color:var(--text2)}
  .badge-wl-contacted{background:var(--blue-bg);color:var(--blue-text)}
  .badge-wl-no_reply{background:var(--amber-bg);color:var(--amber-text)}
  .badge-wl-scheduled{background:var(--teal-bg);color:var(--teal-text)}
  .badge-wl-declined{background:var(--red-bg);color:var(--red-text)}
  .badge-prio-high{background:#3b1020;color:#f3a9c9}
  .badge-prio-low{background:var(--surface2);color:var(--text2)}
}

.app{max-width:960px;margin:0 auto;padding:1.5rem 1rem}
h1{font-size:20px;font-weight:600;color:var(--text)}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px}
.topbar-left{display:flex;align-items:center;gap:10px}
.logo-dot{width:10px;height:10px;border-radius:50%;background:var(--purple);display:inline-block;margin-right:4px}
.tab-bar{display:flex;gap:2px;background:var(--surface2);border-radius:var(--radius);padding:3px;border:1px solid var(--border)}
.tab{padding:6px 16px;font-size:13px;border:none;background:transparent;border-radius:6px;cursor:pointer;color:var(--text2);font-family:inherit;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{background:var(--surface);color:var(--text);font-weight:500;border:1px solid var(--border)}
.btn{padding:7px 14px;font-size:13px;border:1px solid var(--border);background:var(--surface);border-radius:var(--radius);cursor:pointer;color:var(--text);font-family:inherit;display:inline-flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--surface2);border-color:var(--border2)}
.btn-primary{background:var(--purple);color:#fff;border-color:var(--purple)}
.btn-primary:hover{opacity:.88}
.btn-danger{background:var(--red-bg);color:var(--red-text);border-color:var(--red-text)}

.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:1.25rem}
.metric{background:var(--surface2);border-radius:var(--radius);padding:12px 14px}
.metric-label{font-size:11px;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.metric-val{font-size:22px;font-weight:600;color:var(--text);line-height:1}
.metric-sub{font-size:11px;color:var(--text3);margin-top:3px}

.panel{display:none}.panel.active{display:block}

/* Calendar */
.cal-nav{display:flex;align-items:center;gap:8px;margin-bottom:1rem}
.cal-title{font-size:15px;font-weight:500;color:var(--text);flex:1;text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-hdr{text-align:center;font-size:11px;color:var(--text3);padding:4px 0;font-weight:500;text-transform:uppercase;letter-spacing:.3px}
.cal-day{min-height:72px;border-radius:var(--radius);border:1px solid var(--border);padding:5px;cursor:pointer;background:var(--surface);transition:border-color .12s;position:relative;box-sizing:border-box;overflow:visible}
.cal-day:hover{border-color:var(--border2);z-index:10}
.cal-day.other-month{opacity:.35;cursor:default;pointer-events:none}
.cal-day.today{border-color:var(--purple);border-width:2px;cursor:pointer}
.cal-day-num{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:2px;pointer-events:none}
.cal-day.today .cal-day-num{color:var(--purple);font-weight:700}
.appt-dot{font-size:10px;padding:1px 4px;border-radius:3px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;pointer-events:none}
.appt-dot.et{background:#dbeafe;color:#1e40af}          /* Blau — Einzeltherapie */
.appt-dot.vt{background:#ede9fe;color:#5b21b6}          /* Lila — TSS */
.appt-dot.gt{background:#d1fae5;color:#065f46}          /* Grün — Gruppentherapie */
.appt-dot.konsult{background:#fef3c7;color:#92400e}     /* Gelb — Probatorik */
.appt-dot.amber{background:#ffedd5;color:#9a3412}       /* Orange — Selbstzahler */
.appt-dot.pink{background:#fce7f3;color:#9d174d}        /* Pink — Privat */
.appt-dot.phone{background:#ccfbf1;color:#0f766e}       /* Türkis — Telefontermin */
.appt-dot.canceled{background:var(--red-bg);color:var(--red-text);text-decoration:line-through}
.appt-dot.noshow{background:#fef2f2;color:#991b1b;font-style:italic}
/* Slot summary tooltip */
.cal-tip{position:absolute;z-index:50;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:7px 11px;font-size:12px;color:var(--text2);pointer-events:none;box-shadow:0 3px 12px rgba(0,0,0,.1);white-space:nowrap;top:calc(100% + 4px);left:0;display:none;min-width:160px}
.cal-tip-row{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.cal-tip-row:last-child{margin-bottom:0}
.cal-tip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

.search-bar{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;background:var(--surface);color:var(--text);font-family:inherit;outline:none;transition:border-color .15s}
.search-bar:focus{border-color:var(--purple)}
.patient-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius);border:1px solid var(--border);margin-bottom:6px;cursor:pointer;background:var(--surface);transition:all .12s}
.patient-row:hover{border-color:var(--border2);background:var(--surface2)}
.av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.av-blue{background:var(--blue-bg);color:var(--blue-text)}
.av-teal{background:var(--teal-bg);color:var(--teal-text)}
.av-amber{background:var(--amber-bg);color:var(--amber-text)}
.av-purple{background:var(--purple-bg);color:var(--purple-text)}
.av-gray{background:var(--surface2);color:var(--text2)}
.patient-info{flex:1;min-width:0}
.patient-name{font-size:14px;font-weight:500;color:var(--text)}
.patient-meta{font-size:12px;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.patient-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
.pstat{text-align:right}
.pstat-val{font-size:14px;font-weight:600;color:var(--text)}
.pstat-lbl{font-size:10px;color:var(--text3)}
.badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:500;white-space:nowrap}
.badge-active{background:var(--teal-bg);color:var(--teal-text)}
.badge-pause{background:var(--amber-bg);color:var(--amber-text)}
.badge-done{background:var(--surface2);color:var(--text2)}
.badge-wl-new{background:#f1f5f9;color:#475569}
.badge-wl-contacted{background:#dbeafe;color:#1e40af}
.badge-wl-no_reply{background:#fef3c7;color:#92400e}
.badge-wl-scheduled{background:#d1fae5;color:#065f46}
.badge-wl-declined{background:#fee2e2;color:#991b1b}
.badge-prio-high{background:#fce7f3;color:#9d174d;font-size:10px;padding:1px 6px;border-radius:3px}
.badge-prio-low{background:#f1f5f9;color:#64748b;font-size:10px;padding:1px 6px;border-radius:3px}

.back-btn{background:none;border:none;cursor:pointer;color:var(--purple);font-size:13px;padding:0 0 1rem;font-family:inherit;display:flex;align-items:center;gap:4px}
.detail-card{border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.1rem 1.25rem;background:var(--surface);margin-bottom:1rem}
.detail-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.drow{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid var(--border)}
.drow:last-child{border-bottom:none}
.drow-lbl{color:var(--text2)}
.drow-val{color:var(--text);font-weight:500;text-align:right;max-width:60%}
.section-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:8px}
.srow{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.srow:last-child{border-bottom:none}
.srow-date{color:var(--text2);width:88px;flex-shrink:0}
.srow-type{flex:1;color:var(--text)}
.srow-dur{color:var(--text2);width:50px;text-align:right;flex-shrink:0}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-bottom:1.25rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.1rem}
.stat-card-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:10px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.bar-lbl{font-size:12px;color:var(--text2);width:95px;flex-shrink:0;text-align:right}
.bar-track{flex:1;height:18px;background:var(--surface2);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px}
.bar-num{font-size:12px;color:var(--text2);width:28px;text-align:right}
.week-row{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.wday{background:var(--surface2);border-radius:var(--radius);padding:8px 6px;text-align:center}
.wday-name{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px}
.wday-num{font-size:18px;font-weight:600;color:var(--text);line-height:1.2}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem}
.modal{background:var(--surface);border-radius:var(--radius-lg);padding:1.5rem;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;border:1px solid var(--border)}
.modal h2{font-size:16px;font-weight:600;margin-bottom:1rem;color:var(--text)}
.form-row{margin-bottom:10px}
.form-row label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px;font-weight:500}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;background:var(--surface);color:var(--text);font-family:inherit;outline:none;transition:border-color .15s}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--purple)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:1.2rem}
.hidden{display:none!important}

/* ICD search */
.icd-wrap{position:relative}
.icd-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);max-height:220px;overflow-y:auto;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.icd-item{padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:baseline}
.icd-item:last-child{border-bottom:none}
.icd-item:hover{background:var(--surface2)}
.icd-code{font-weight:600;color:var(--purple);flex-shrink:0;font-size:12px;width:44px}
.icd-name{color:var(--text);line-height:1.3}
.icd-selected{display:inline-flex;align-items:center;gap:6px;background:var(--purple-bg);color:var(--purple-text);padding:4px 10px;border-radius:4px;font-size:12px;font-weight:500;margin-top:6px}
.icd-selected button{background:none;border:none;cursor:pointer;color:var(--purple-text);font-size:14px;line-height:1;padding:0}

.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:9px 18px;border-radius:var(--radius);font-size:13px;font-weight:500;z-index:300;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--text3);font-size:14px}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-left">
      <span class="logo-dot"></span>
      <h1>Psychotherapie — Terminkalender</h1>
      <span style="font-size:11px;color:var(--text3);font-weight:500;margin-left:6px">v1.4.3</span>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <div class="tab-bar">
        <button class="tab" onclick="switchTab('kalender')">Kalender</button>
        <button class="tab active" onclick="switchTab('heute')">Heute</button>
        <button class="tab" onclick="switchTab('patienten')">Patienten</button>
        <button class="tab" onclick="switchTab('warteliste')">Warteliste</button>
        <button class="tab" onclick="switchTab('statistik')">Statistik</button>
      </div>
      <button class="btn" onclick="exportData()" title="Daten als Backup-Datei speichern">💾 Export</button>
      <button class="btn" onclick="document.getElementById('import-file').click()" title="Backup wiederherstellen">📂 Import</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(this)">
      <button class="btn btn-primary" onclick="openNewAppt()">+ Termin</button>
    </div>
  </div>

  <div class="metrics" id="metrics"></div>

  <div class="panel" id="panel-kalender">
    <div class="cal-nav">
      <button class="btn" onclick="changeMonth(-1)">&#8249;</button>
      <div class="cal-title" id="cal-title"></div>
      <button class="btn" onclick="changeMonth(1)">&#8250;</button>
      <button class="btn" onclick="goToToday()" style="margin-left:4px">Heute</button>
    </div>
    <div class="cal-grid" id="cal-headers"></div>
    <div class="cal-grid" id="cal-body" style="margin-top:3px"></div>
  </div>

  <div class="panel active" id="panel-heute">
    <div id="heute-content"></div>
  </div>

  <div class="panel" id="panel-patienten">
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <input class="search-bar" style="margin:0;flex:1" placeholder="Patient suchen nach Name, ICD-Code oder Diagnose…" oninput="filterPatients(this.value)" id="psearch">
      <select id="patient-sort" onchange="savePatientSort(this.value);renderPatients(document.getElementById('psearch').value)" style="padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:inherit;color:var(--text);background:var(--surface);cursor:pointer">
        <option value="nachname">Nachname A–Z</option>
        <option value="termin">Nächster Termin</option>
        <option value="status">Status</option>
      </select>
      <button class="btn" onclick="switchSubTab('patienten-liste')" id="subtab-liste" style="font-weight:500">Patienten</button>
      <button class="btn" onclick="switchSubTab('patienten-gruppen')" id="subtab-gruppen">Gruppen</button>
      <button class="btn" onclick="switchSubTab('patienten-archiv')" id="subtab-archiv">Archiv</button>
      <button class="btn btn-primary" id="btn-new-patient" onclick="openNewPatient()">+ Patient</button>
    </div>
    <div id="patienten-liste-content"><div id="patient-list"></div></div>
    <div id="patienten-gruppen-content" style="display:none"><div id="group-list"></div></div>
    <div id="patienten-archiv-content" style="display:none"><div id="archiv-list"></div></div>
  </div>

  <div class="panel" id="panel-detail">
    <button class="back-btn" id="detail-back-btn" onclick="detailBack()">&#8592; Zurück</button>
    <div id="detail-content"></div>
  </div>

  <div class="panel" id="panel-day">
    <button class="back-btn" onclick="backToKal()">&#8592; Zurück zum Kalender</button>
    <div id="day-content"></div>
  </div>

  <div class="panel" id="panel-statistik">
    <div id="stats-content"></div>
  </div>

  <div class="panel" id="panel-warteliste">
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center">
      <input class="search-bar" style="margin:0;flex:1;min-width:180px" placeholder="Suchen nach Name, Telefon…" oninput="filterWaitlist(this.value)" id="wl-search">
      <select id="wl-filter-status" onchange="filterWaitlist(document.getElementById('wl-search').value)" style="padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;background:var(--surface);color:var(--text);font-family:inherit;outline:none">
        <option value="">Alle Status</option>
        <option value="new">Noch nicht kontaktiert</option>
        <option value="contacted">Kontaktiert</option>
        <option value="no_reply">Keine Antwort</option>
        <option value="scheduled">Termin vereinbart</option>
        <option value="declined">Abgesagt/Abgebrochen</option>
      </select>
      <select id="wl-sort" onchange="saveWLSort(this.value);renderWaitlist(document.getElementById('wl-search').value)" style="padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;background:var(--surface);color:var(--text);font-family:inherit;outline:none">
        <option value="prio_wartezeit">Priorität + Wartezeit</option>
        <option value="wartezeit">Wartezeit (längste zuerst)</option>
        <option value="name">Name A–Z</option>
        <option value="letzter_kontakt">Letzter Kontakt</option>
        <option value="status">Status</option>
      </select>
      <button class="btn btn-primary" onclick="openNewWaitlistEntry()">+ Eintrag</button>
    </div>
    <div id="wl-summary" style="margin-bottom:10px"></div>
    <div id="waitlist-entries"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Modal: Termin -->
<div class="overlay hidden" id="modal-appt">
  <div class="modal">
    <h2 id="modal-appt-title">Neuer Termin</h2>
    <div class="form-row" id="appt-patient-row"><label>Patient</label>
      <select id="appt-patient" onchange="checkProbatorik(this.value);if(document.getElementById('appt-type').value!=='telefon'&&document.getElementById('appt-type').value!=='gt')onApptTypeChange()"></select>
    </div>
    <div class="form-row hidden" id="appt-group-row"><label>Gruppe</label>
      <select id="appt-group"><option value="">– Gruppe wählen –</option></select>
      <div style="font-size:11px;color:var(--text3);margin-top:4px">Für alle Mitglieder der Gruppe wird ein Termin angelegt.</div>
    </div>
    <div class="form-row"><label>Datum</label><input type="date" id="appt-date" onchange="onApptTypeChange()"></div>
    <div class="form-row"><label>Sitzungsart</label>
      <select id="appt-type" onchange="onApptTypeChange()">
        <option value="probatorik">Probatorik</option>
        <option value="et">Einzeltherapie</option>
        <option value="gt">Gruppentherapie</option>
        <option value="tss">TSS (Terminservicestelle)</option>
        <option value="selbst">Selbstzahler</option>
        <option value="privat">Privat</option>
        <option value="telefon">Telefontermin</option>
      </select>
    </div>
    <div class="form-row" id="slot-row"><label>Zeitslot</label>
      <div id="slot-buttons" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:2px"></div>
      <input type="hidden" id="appt-time">
      <input type="hidden" id="appt-dur">
    </div>
    <div class="form-row hidden" id="phone-time-row">
      <label>Uhrzeit</label>
      <input type="time" id="appt-phone-time" value="08:00" style="max-width:140px" oninput="document.getElementById('appt-time').value=this.value;document.getElementById('appt-dur').value=30">
      <div style="font-size:11px;color:var(--text3);margin-top:4px">Dauer: 30 min · kein fester Slot</div>
    </div>

const SK_P='psycho_patients', SK_A='psycho_appts', SK_G='psycho_groups', SK_W='psycho_waitlist';
// Abrechenbare Sitzungstypen (Telefontermine zählen nicht)
const SESSION_TYPES=new Set(['probatorik','et','gt','tss','selbst','privat']);
// Prüft ob ein Termin bereits stattgefunden hat (Datum + Uhrzeit)
function apptHasPassed(a){
  const today=todayStr();
  if(a.date<today)return true;
  if(a.date>today)return false;
  // Heute: Uhrzeit vergleichen
  const now=new Date();
  const nowMin=now.getHours()*60+now.getMinutes();
  const[h,m]=(a.time||'00:00').split(':').map(Number);
  return nowMin>=(h*60+m);
}

];

const IDB_NAME='terminkalenderDB', IDB_VERSION=1, IDB_STORE='data';

let _idb=null;        // gecachtes IDBDatabase-Handle
let _useIDB=true;     // false → Fallback auf localStorage (z.B. privater Modus)
const MEM={};         // In-Memory-Cache: Schlüssel → Array

function openIDB(){
  return new Promise((resolve,reject)=>{
    if(_idb){resolve(_idb);return;}
    if(!('indexedDB' in window)||!window.indexedDB){reject(new Error('IndexedDB nicht verfügbar'));return;}
    const req=indexedDB.open(IDB_NAME,IDB_VERSION);
    req.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains(IDB_STORE)) db.createObjectStore(IDB_STORE);
    };
    req.onsuccess=e=>{_idb=e.target.result; resolve(_idb);};
    req.onerror=e=>reject(e.target.error);
  });
}
function idbGet(db,key){
  return new Promise((resolve,reject)=>{
    const req=db.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).get(key);
    req.onsuccess=e=>resolve(e.target.result);
    req.onerror=e=>reject(e.target.error);
  });
}
function idbPut(db,key,val){
  return new Promise((resolve,reject)=>{
    const req=db.transaction(IDB_STORE,'readwrite').objectStore(IDB_STORE).put(JSON.parse(JSON.stringify(val)),key);
    req.onsuccess=()=>resolve();
    req.onerror=e=>reject(e.target.error);
  });
}

// Defensiv parsen: ein korrupter localStorage-Eintrag soll nicht die ganze App crashen.
function lsLoad(key){
  try{
    const v=JSON.parse(localStorage.getItem(key)||'[]');
    return Array.isArray(v)?v:[];
  }catch(e){
    console.warn('Beschädigte Daten in',key,'– ignoriert.',e);
    return [];
  }
}

// Beim Start: IndexedDB öffnen, alle Schlüssel in den Cache laden, ggf. aus
// localStorage migrieren. Bei fehlender IndexedDB-Unterstützung Fallback auf localStorage.
async function loadDB(){
  try{
    const db=await openIDB();
    let migrated=false;
    for(const key of SK_ALL){
      let val=await idbGet(db,key);
      if(!Array.isArray(val)){
        // Migration: vorhandenen localStorage-Eintrag übernehmen
        if(localStorage.getItem(key)!==null){ val=lsLoad(key); await idbPut(db,key,val); migrated=true; }
        else val=[];
      }
      MEM[key]=val;
    }
    if(migrated){
      SK_ALL.forEach(k=>{try{localStorage.removeItem(k)}catch(e){}});
      console.info('Von localStorage zu IndexedDB migriert.');
    }
  }catch(e){
    console.warn('IndexedDB nicht verfügbar – nutze localStorage.',e);
    _useIDB=false;
    SK_ALL.forEach(k=>{MEM[k]=lsLoad(k);});
  }
}

// Synchrones Lesen aus dem Cache (alle bestehenden Aufrufe bleiben unverändert).

// Synchron in den Cache schreiben + asynchron persistieren.
function saveJSON(key,d){
  MEM[key]=d;
  if(_useIDB){
    openIDB().then(db=>idbPut(db,key,d)).catch(e=>{
      console.error('Speichern (IndexedDB) fehlgeschlagen für',key,e);
      try{ localStorage.setItem(key,JSON.stringify(d)); }
      catch(e2){ alert('Speichern fehlgeschlagen (Speicher voll oder gesperrt). Bitte ein Backup exportieren.'); }
    });
    return true;
  }
  try{
    localStorage.setItem(key,JSON.stringify(d));
    return true;
  }catch(e){
    console.error('Speichern fehlgeschlagen für',key,e);
    alert('Speichern fehlgeschlagen (Speicher voll oder gesperrt). Bitte ein Backup exportieren.');
    return false;
  }
}

// HTML-Escaping für alle in innerHTML interpolierten Nutzereingaben (auch in Attributwerten).
function esc(str){
  if(str===null||str===undefined)return'';

}

function getSlotSummary(key){
  const booked=new Set(loadAppts().filter(a=>a.date===key&&a.type!=='canceled').map(a=>a.time));
  const freeS=SLOTS_SINGLE.filter(s=>!booked.has(s.t)).length;
  const freeG=SLOTS_GROUP.filter(s=>!booked.has(s.t)).length;
  const total=booked.size;
  const parts=[];
  if(freeS>0)parts.push(`${freeS} Einzelslot${freeS!==1?'s':''} frei`);
  else parts.push('Einzelslots voll');
  if(freeG>0)parts.push(`${freeG} Gruppenslot${freeG!==1?'s':''} frei`);
  else parts.push('Gruppenslots voll');
  if(total>0)parts.push(`${total} belegt`);
  return parts.join('  ·  ');
}

  appts.forEach(a=>{(apptMap[a.date]=apptMap[a.date]||[]).push(a)});
  let dow=new Date(viewYear,viewMonth,1).getDay();dow=dow===0?6:dow-1;
  const dim=new Date(viewYear,viewMonth+1,0).getDate();
  const dip=new Date(viewYear,viewMonth,0).getDate();
  const today=todayStr(), patients=loadPatients();
  let cells='';
  for(let i=0;i<dow;i++)cells+=`<div class="cal-day other-month"><div class="cal-day-num">${dip-dow+1+i}</div></div>`;
  for(let d=1;d<=dim;d++){
    const key=viewYear+'-'+pad(viewMonth+1)+'-'+pad(d);
    const list=apptMap[key]||[];
    const isToday=key===today;
    const dots=list.filter(a=>a.type!=='canceled').slice(0,3).map(a=>{
      const p=patients.find(x=>x.id===a.patientId);
      return`<div class="appt-dot ${TYPE_COLOR[a.type]||'et'}">${p?esc(p.name.split(',')[0]):'?'}</div>`;
    }).join('');
    const more=list.length>3?`<div style="font-size:9px;color:var(--text3);pointer-events:none">+${list.length-3}</div>`:'';
    cells+=`<div class="cal-day${isToday?' today':''}" data-key="${key}"><div class="cal-day-num">${d}</div>${dots}${more}</div>`;
  }
  const rem=(7-(dow+dim)%7)%7;
  for(let d=1;d<=rem;d++)cells+=`<div class="cal-day other-month"><div class="cal-day-num">${d}</div></div>`;
  document.getElementById('cal-body').innerHTML=cells;
  // attach events via JS — no inline handlers so clicks are never swallowed
  document.querySelectorAll('#cal-body .cal-day:not(.other-month)').forEach(el=>{
    const key=el.dataset.key;
    el.addEventListener('click',()=>{hideCalTip();showDay(key);});
    el.addEventListener('mouseenter',e=>showCalTip(e,key));
    el.addEventListener('mouseleave',hideCalTip);
  });
}
function changeMonth(dir){viewMonth+=dir;if(viewMonth>11){viewMonth=0;viewYear++;}else if(viewMonth<0){viewMonth=11;viewYear--;}renderCal()}

// ── Hover tooltip ─────────────────────────────────────────────────────────────
function showCalTip(e, key){
  hideCalTip();
  const cell=e.currentTarget;
  const booked=new Set(loadAppts().filter(a=>a.date===key&&a.type!=='canceled').map(a=>a.time));
  const freeS=SLOTS_SINGLE.filter(s=>!booked.has(s.t)).length;
  const freeG=SLOTS_GROUP.filter(s=>!booked.has(s.t)).length;
  const totalBooked=booked.size;
  const tip=document.createElement('div');
  tip.className='cal-tip';
  tip.id='cal-tip-active';
  tip.innerHTML=`
    <div class="cal-tip-row"><span class="cal-tip-dot" style="background:#378ADD"></span><span>${freeS} Einzelslot${freeS!==1?'s':''} frei</span></div>
    <div class="cal-tip-row"><span class="cal-tip-dot" style="background:#1D9E75"></span><span>${freeG} Gruppenslot${freeG!==1?'s':''} frei</span></div>
    ${totalBooked>0?`<div class="cal-tip-row"><span class="cal-tip-dot" style="background:#9a9a94"></span><span>${totalBooked} belegt</span></div>`:''}`;
  tip.style.display='block';
  cell.appendChild(tip);
}
function hideCalTip(){
  const old=document.getElementById('cal-tip-active');
  if(old)old.remove();
}

// ── Day view with full slot grid ──────────────────────────────────────────────
function showDay(key){
  const patients=loadPatients();
  const groups=loadGroups();
  // Alle Termine des Tages (inkl. abgesagte) laden. Abgesagte Einzeltermine geben
  // den Slot wieder frei und werden ausgeblendet; abgesagte Gruppenteilnehmer
  // bleiben dagegen durchgestrichen sichtbar (haben eine groupId).
  const dayAppts=loadAppts().filter(a=>a.date===key);
  const activeAppts=dayAppts.filter(a=>a.type!=='canceled');
  const visibleAppts=dayAppts.filter(a=>a.type!=='canceled'||a.groupId);
  const toMin=t=>parseInt(t.split(':')[0])*60+parseInt(t.split(':')[1]);

  // Alle (sichtbaren) Termine, die exakt zu einem Slot passen (gleiche Zeit + Dauer).
  function slotBookings(slotStart, slotDur){
    return visibleAppts.filter(a=>a.time===slotStart && (a.dur||60)===slotDur);
  }
  // Belegt ein AKTIVER Termin den Zeitraum? (für das Ausblenden freier Slots)
  function overlapsAnyBooking(slotStart, slotDur){
    const sStart=toMin(slotStart), sEnd=sStart+slotDur;
    return activeAppts.some(a=>{
      const bStart=toMin(a.time||'00:00'), bEnd=bStart+(a.dur||60);
      return sStart<bEnd && sEnd>bStart;
    });
  }

  // Eine Teilnehmer-Zeile (Name + Status + Aktionen) für einen Termin.
  function partInner(a, metaTag){
    const p=patients.find(x=>x.id===a.patientId);
    const name=p?p.name:'Unbekannt';
    const canceled=a.type==='canceled', noshow=a.type==='noshow';
    const dim=canceled||noshow;
    const statusLabel=canceled?(a.rescheduled?'Verlegt':'Abgesagt'):noshow?'No-Show':(TYPE_LABEL[a.type]||a.type);
    const nameEl=p
      ? `<div style="font-size:13px;font-weight:500;color:var(--blue);cursor:pointer;${canceled?'text-decoration:line-through;':''}${dim?'opacity:.7;':''};display:inline" onclick="showPatientCtxMenu(event,'${p.id}','${a.id}')">${esc(name)}</div>`
      : `<div style="font-size:13px;font-weight:500;color:var(--text);${dim?'opacity:.7;':''}">${esc(name)}</div>`;
    return `<div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
      <div>
        ${nameEl}
        <div style="display:flex;gap:5px;align-items:center;margin-top:3px;flex-wrap:wrap">
          <span class="appt-dot ${TYPE_COLOR[a.type]||'et'}">${statusLabel}</span>
          ${!dim&&metaTag?metaTag:''}
          ${a.note?`<span style="font-size:11px;color:var(--text3)">· ${esc(a.note)}</span>`:''}
        </div>
      </div>
      <div style="display:flex;gap:4px;flex-shrink:0;align-items:center">
        ${!dim?`<button onclick="markAppt('${a.id}','canceled','${key}')" title="Abgesagt" style="background:none;border:1px solid var(--border);border-radius:5px;cursor:pointer;font-size:11px;padding:3px 7px;color:var(--red-text);font-family:inherit;white-space:nowrap">📵 Abgesagt</button>
        <button onclick="markAppt('${a.id}','noshow','${key}')" title="Nicht erschienen" style="background:none;border:1px solid var(--border);border-radius:5px;cursor:pointer;font-size:11px;padding:3px 7px;color:var(--red-text);font-family:inherit;white-space:nowrap">🚫 No-Show</button>`:''}
        ${dim?`<button onclick="restoreAppt('${a.id}','${key}')" title="Markierung zurücksetzen" style="background:none;border:1px solid var(--border);border-radius:5px;cursor:pointer;font-size:11px;padding:3px 7px;color:var(--teal-text);font-family:inherit;white-space:nowrap">↩ Zurücksetzen</button>`:''}
        ${!dim?`<button onclick="editAppt('${a.id}')" style="background:none;border:none;cursor:pointer;font-size:13px;padding:4px;color:var(--text2)" title="Bearbeiten">✏️</button>`:''}
        <button onclick="deleteApptDay('${a.id}','${key}')" style="background:none;border:none;cursor:pointer;font-size:13px;padding:4px;color:var(--red-text)" title="Löschen">✕</button>
      </div>
    </div>`;
  }

  const[y,m,d]=key.split('-');
  const label=`${parseInt(d)}. ${MONTHS[parseInt(m)-1]} ${y}`;

  const allSlots=[
    ...SLOTS_SINGLE.map(s=>({...s,cat:'single'})),
    ...SLOTS_GROUP.map(s=>({...s,cat:'group'}))
  ].sort((a,b)=>a.t.localeCompare(b.t));

  const shownIds=new Set();
  let slotHtml='';
  allSlots.forEach(s=>{
    const booked=slotBookings(s.t, s.d).sort((a,b)=>{
      const ca=a.type==='canceled'?1:0, cb=b.type==='canceled'?1:0;
      if(ca!==cb)return ca-cb;
      const na=(patients.find(x=>x.id===a.patientId)||{}).name||'';
      const nb=(patients.find(x=>x.id===b.patientId)||{}).name||'';
      return na.localeCompare(nb);
    });
    booked.forEach(a=>shownIds.add(a.id));
    // Freier Slot, dessen Zeitraum aber durch eine aktive Buchung belegt ist → ausblenden
    if(!booked.length && overlapsAnyBooking(s.t, s.d)) return;

    const endH=parseInt(s.t.split(':')[0])+Math.floor(s.d/60);
    const endM=pad(parseInt(s.t.split(':')[1])+(s.d%60));
    const catLabel=s.cat==='group'?'Gruppe':'Einzel';
    const catColor=s.cat==='group'?'var(--teal-text)':'var(--blue-text)';
    const catBg=s.cat==='group'?'var(--teal-bg)':'var(--blue-bg)';

    if(booked.length){
      const anyNoshow=booked.some(a=>a.type==='noshow');
      const allCanceled=booked.every(a=>a.type==='canceled');
      const barColor=allCanceled?'var(--red-text)':anyNoshow?'var(--red-text)':'var(--border2)';
      const isGroup=s.cat==='group';
      const gId=(booked.find(a=>a.groupId)||{}).groupId;
      const grp=gId?groups.find(g=>g.id===gId):null;
      const catTag=`<span style="font-size:10px;background:${catBg};color:${catColor};padding:1px 6px;border-radius:3px;font-weight:500">${catLabel}</span>`;
      const header=isGroup?`<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);flex-wrap:wrap">
        ${catTag}
        <span style="font-size:13px;font-weight:600;color:var(--text)">${grp?esc(grp.name):'Gruppentermin'}</span>
        <span style="font-size:11px;color:var(--text3)">${booked.length} Teilnehmer</span>
      </div>`:'';
      const rows=booked.map(a=>partInner(a, isGroup?'':catTag)).join('<div style="height:1px;background:var(--border);margin:8px 0"></div>');
      slotHtml+=`<div style="display:flex;gap:10px;align-items:stretch;margin-bottom:6px">
        <div style="width:86px;flex-shrink:0;text-align:right;padding-top:10px">
          <div style="font-size:12px;font-weight:600;color:var(--text2)">${s.t} Uhr</div>
          <div style="font-size:10px;color:var(--text3)">${pad(endH)}:${endM} Uhr</div>
        </div>
        <div style="width:3px;border-radius:2px;flex-shrink:0;background:${barColor}"></div>
        <div style="flex:1;border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px;background:var(--surface)">${header}${rows}</div>
      </div>`;
    } else {
      slotHtml+=`<div style="display:flex;gap:10px;align-items:stretch;margin-bottom:6px">
        <div style="width:86px;flex-shrink:0;text-align:right;padding-top:10px">
          <div style="font-size:12px;font-weight:600;color:var(--text3)">${s.t} Uhr</div>
          <div style="font-size:10px;color:var(--text3)">${pad(endH)}:${endM} Uhr</div>
        </div>
        <div style="width:3px;border-radius:2px;flex-shrink:0;background:var(--border)"></div>
        <div style="flex:1;border:1px dashed var(--border);border-radius:var(--radius);padding:9px 12px;background:transparent;cursor:pointer"
             onclick="openNewApptDateSlot('${key}','${s.t}',${s.d},'${s.cat==='group'?'gt':'et'}')"
             onmouseenter="this.style.background='var(--surface2)';this.style.borderColor='var(--purple)'"
             onmouseleave="this.style.background='transparent';this.style.borderColor='var(--border)'">
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:12px;color:var(--text3)">Frei</span>
            <span style="font-size:10px;background:${catBg};color:${catColor};padding:1px 6px;border-radius:3px;font-weight:500">${catLabel}</span>
            <span style="font-size:11px;color:var(--text3)">${s.d} min</span>
            <span style="font-size:11px;color:var(--purple);margin-left:auto">+ Termin eintragen →</span>
          </div>
        </div>
      </div>`;
    }
  });

  // Termine, die zu keinem festen Slot passen (z.B. Telefontermine oder abweichende
  // Zeiten/Dauern), würden sonst in der Tagesansicht fehlen → separat anzeigen.
  const extras=visibleAppts.filter(a=>!shownIds.has(a.id)).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  let extraHtml='';
  if(extras.length){
    extraHtml+=`<div style="margin-top:14px;font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:var(--text3)">Weitere Termine</div>`;
    extras.forEach(a=>{
      const dur=a.dur||60;
      const endMin=toMin(a.time||'00:00')+dur;
      const endStr=pad(Math.floor(endMin/60))+':'+pad(endMin%60);
      const durTag=`<span style="font-size:11px;color:var(--text3)">${dur} min</span>`;
      extraHtml+=`<div style="display:flex;gap:10px;align-items:stretch;margin-bottom:6px;margin-top:6px">
        <div style="width:86px;flex-shrink:0;text-align:right;padding-top:10px">
          <div style="font-size:12px;font-weight:600;color:var(--text2)">${a.time||'–'} Uhr</div>
          <div style="font-size:10px;color:var(--text3)">${endStr} Uhr</div>
        </div>
        <div style="width:3px;border-radius:2px;flex-shrink:0;background:${a.type==='canceled'?'var(--red-text)':a.type==='noshow'?'var(--red-text)':'var(--border2)'}"></div>
        <div style="flex:1;border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px;background:var(--surface)">${partInner(a, durTag)}</div>
      </div>`;
    });
  }

  document.getElementById('day-content').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem">
      <div style="font-size:15px;font-weight:500;color:var(--text)">${label}</div>
      <button class="btn btn-primary" onclick="openNewApptDate('${key}')">+ Termin</button>
    </div>${slotHtml}${extraHtml}`;

  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-day').classList.add('active');
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.tab[onclick="switchTab('kalender')"]`).classList.add('active');
}

function deleteApptDay(id,key){
  if(!confirm('Termin löschen?'))return;
  saveAppts(loadAppts().filter(x=>x.id!==id));
  renderMetrics();showDay(key);showToast('Termin gelöscht.');
}

// Versehentliche Absage/No-Show rückgängig machen: ursprünglichen Termintyp
// (origType) wiederherstellen und Status entfernen.
function restoreAppt(id,key){
  const appts=loadAppts();
  const i=appts.findIndex(x=>x.id===id);
  if(i<0)return;
  const a=appts[i];
  const restored={...a, type:a.origType||'et', rescheduled:false};
  delete restored.origType;
  appts[i]=restored;
  saveAppts(appts);
  renderMetrics();showDay(key);showToast('Termin wiederhergestellt.');
}

function markAppt(id, status, key){
  const appts=loadAppts();
  const i=appts.findIndex(x=>x.id===id);
  if(i<0)return;
  const orig=appts[i];
  // Ursprünglichen Termintyp bewahren (sonst geht er beim Absagen/No-Show verloren).
  const origType=orig.origType||orig.type;
  appts[i]={...orig, origType, type:status, rescheduled:false};
  saveAppts(appts);
  renderMetrics();
  showDay(key);
  if(status==='canceled'){
    showToast('Als abgesagt markiert.');
    setTimeout(()=>{
      if(confirm('Möchtest du direkt einen Ersatztermin eintragen?')){
        // mark original as rescheduled (= not a real dropout)
        const a2=loadAppts();
        const j=a2.findIndex(x=>x.id===id);
        if(j>=0){a2[j].rescheduled=true;saveAppts(a2);}
        openNewAppt();
        populatePatientSelect(orig.patientId);
        document.getElementById('appt-type').value=orig.origType||orig.type||'et';
        checkProbatorik(orig.patientId);
        onApptTypeChange();
      }
    },300);
  } else {
    showToast('Als nicht erschienen (No-Show) markiert.');
  }
}

function openNewApptDateSlot(date,time,dur,type){
  openNewAppt();
  document.getElementById('appt-date').value=date;
  document.getElementById('appt-type').value=type;
  // Wichtig: Patienten-/Gruppen-Felder an die Sitzungsart anpassen, sonst bleibt
  // bei einem Gruppen-Slot fälschlich das Patienten-Dropdown sichtbar.
  onApptTypeChange();
  document.getElementById('appt-time').value=time;
  document.getElementById('appt-dur').value=dur;
  updateSlots(time);
}

function backToKal(){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.getElementById('panel-kalender').classList.add('active');renderCal()}

// ── Heute ─────────────────────────────────────────────────────────────────────
function renderHeute(){
  const today=todayStr();
  const appts=loadAppts().filter(a=>a.date===today).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  const patients=loadPatients();
  const now=new Date();
  const[y,m,d]=today.split('-');
  const label=`${parseInt(d)}. ${MONTHS[parseInt(m)-1]} ${y}`;
  let html=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem">
    <div>
      <div style="font-size:18px;font-weight:600;color:var(--text)">${label}</div>
      <div style="font-size:13px;color:var(--text2);margin-top:2px">${appts.filter(a=>a.type!=='canceled').length} Termin${appts.filter(a=>a.type!=='canceled').length!==1?'e':''} heute</div>
    </div>
    <button class="btn btn-primary" onclick="openNewApptDate('${today}')">+ Termin</button>
  </div>`;

  if(!appts.length){
    html+=`<div class="empty" style="padding:3rem 1rem">Keine Termine für heute.</div>`;
  } else {
    // Group by time slot visually
    const slots=['09:00','11:00','13:00','15:00','16:00'];
    const grouped={};
    appts.forEach(a=>{
      const key=a.time||'–';
      (grouped[key]=grouped[key]||[]).push(a);
    });
    const allTimes=[...new Set(appts.map(a=>a.time||'–'))].sort();

    html+=`<div style="display:flex;flex-direction:column;gap:8px">`;
    allTimes.forEach(time=>{
      grouped[time].forEach(a=>{
        const p=patients.find(x=>x.id===a.patientId);
        const name=p?p.name:'Unbekannt';
        const endH=parseInt(time.split(':')[0])+Math.floor(a.dur/60);
        const endM=parseInt(time.split(':')[1])+(a.dur%60);
        const endStr=pad(endH)+':'+pad(endM);
        const isCurrent=(()=>{
          const[sh,sm]=time.split(':').map(Number);
          const startMin=sh*60+sm, endMin=startMin+a.dur;
          const nowMin=now.getHours()*60+now.getMinutes();
          return nowMin>=startMin&&nowMin<endMin;
        })();
        const isPast=(()=>{
          const[sh,sm]=time.split(':').map(Number);
          return now.getHours()*60+now.getMinutes()>sh*60+sm+a.dur;
        })();
        html+=`<div style="display:flex;gap:12px;align-items:stretch">
          <div style="width:60px;flex-shrink:0;text-align:right;padding-top:12px">
            <div style="font-size:13px;font-weight:600;color:${isCurrent?'var(--purple)':isPast?'var(--text3)':'var(--text2)'}">${time}</div>
            <div style="font-size:11px;color:var(--text3)">${endStr}</div>
          </div>
          <div style="width:3px;border-radius:2px;flex-shrink:0;background:${isCurrent?'var(--purple)':isPast?'var(--border)':'var(--border2)'}"></div>
          <div style="flex:1;border:1px solid ${isCurrent?'var(--purple)':isPast?'var(--border)':'var(--border)'};border-radius:var(--radius);padding:10px 14px;background:${isCurrent?'var(--purple-bg)':'var(--surface)'};${isPast?'opacity:.6':''}">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
              <div>
                <div style="font-size:14px;font-weight:500;color:var(--text)">${esc(name)}</div>
                <div style="margin-top:3px;display:flex;gap:6px;align-items:center;flex-wrap:wrap">
                  <span class="appt-dot ${TYPE_COLOR[a.type]||'et'}">${TYPE_LABEL[a.type]||a.type}</span>
                  <span style="font-size:11px;color:var(--text3)">${a.dur} min</span>
                  ${a.note?`<span style="font-size:11px;color:var(--text3)">· ${esc(a.note)}</span>`:''}
                </div>
                ${p&&p.diagCodes&&p.diagCodes.length?`<div style="margin-top:4px">${p.diagCodes.map(x=>`<span style="font-size:10px;background:var(--purple-bg);color:var(--purple-text);padding:1px 5px;border-radius:3px;font-weight:500;margin-right:3px">${esc(x.c)}</span>`).join('')}</div>`:''}
              </div>
              <div style="display:flex;gap:4px;flex-shrink:0">
                <button onclick="editAppt('${a.id}')" style="background:none;border:none;cursor:pointer;font-size:14px;padding:4px;color:var(--text2)" title="Bearbeiten">✏️</button>
                <button onclick="deleteApptHeute('${a.id}')" style="background:none;border:none;cursor:pointer;font-size:14px;padding:4px;color:var(--red-text)" title="Löschen">✕</button>
              </div>
            </div>
          </div>
        </div>`;
      });
    });
    html+=`</div>`;
  }
  document.getElementById('heute-content').innerHTML=html;
}

function deleteApptHeute(id){
  if(!confirm('Termin löschen?'))return;
  saveAppts(loadAppts().filter(x=>x.id!==id));
  renderMetrics();renderHeute();showToast('Termin gelöscht.');
}

// ── Patients ──────────────────────────────────────────────────────────────────
function savePatientSort(v){localStorage.setItem('patientSort',v);}
function loadPatientSort(){return localStorage.getItem('patientSort')||'nachname';}
function applyPatientSort(fp, appts){
  const sort=loadPatientSort();
  const sel=document.getElementById('patient-sort');
  if(sel&&sel.value!==sort)sel.value=sort;
  const STATUS_ORDER={active:0,pause:1,done:2};
  if(sort==='nachname'){
    fp.sort((a,b)=>{
      const la=a.name.split(',')[0].trim().toLowerCase();
      const lb=b.name.split(',')[0].trim().toLowerCase();
      return la.localeCompare(lb,'de');
    });
  } else if(sort==='termin'){
    fp.sort((a,b)=>{
      const na=appts.filter(x=>x.patientId===a.id&&x.date>=todayStr()&&x.type!=='canceled').sort((x,y)=>x.date.localeCompare(y.date))[0];
      const nb=appts.filter(x=>x.patientId===b.id&&x.date>=todayStr()&&x.type!=='canceled').sort((x,y)=>x.date.localeCompare(y.date))[0];
      if(!na&&!nb)return 0;
      if(!na)return 1;
      if(!nb)return -1;
      return na.date.localeCompare(nb.date);
    });
  } else if(sort==='status'){
    fp.sort((a,b)=>(STATUS_ORDER[a.status||'active']||0)-(STATUS_ORDER[b.status||'active']||0));
  }
  return fp;
}
function renderPatients(filter=''){
  const patients=loadPatients(), appts=loadAppts(), list=document.getElementById('patient-list');
  const fl=filter.toLowerCase();
  let fp=patients.filter(p=>{
    if(p.status==='done')return false; // im Archiv
    if(!filter)return true;
    if(p.name.toLowerCase().includes(fl))return true;
    const codes=p.diagCodes||[];
    return codes.some(x=>x.c.toLowerCase().includes(fl)||x.n.toLowerCase().includes(fl));
  });
  fp=applyPatientSort(fp, appts);
  if(!fp.length){list.innerHTML=`<div class="empty">${patients.length?'Keine Treffer.':'Noch keine Patienten. Klicke auf "+ Patient".'}</div>`;return}
  list.innerHTML=fp.map(p=>{
    const pAppts=appts.filter(a=>a.patientId===p.id);
    // Abrechenbare Sitzungen (Whitelist, ohne Telefon)
    const sessCount=pAppts.filter(a=>SESSION_TYPES.has(a.type)&&apptHasPassed(a)).length;
    const phoneCount=pAppts.filter(a=>a.type==='telefon'&&apptHasPassed(a)).length;
    const sessLabel=phoneCount>0?`${sessCount} <span style="font-size:9px;color:var(--text3);font-weight:400">+${phoneCount} Tel.</span>`:String(sessCount);
    // Nächster / letzter Termin
    const next=pAppts.filter(a=>a.date>=todayStr()&&a.type!=='canceled').sort((a,b)=>a.date.localeCompare(b.date))[0];
    const last=pAppts.filter(a=>apptHasPassed(a)&&SESSION_TYPES.has(a.type)).sort((a,b)=>b.date.localeCompare(a.date))[0];
    const terminLabel=next
      ? `Nächster: ${formatDate(next.date)} ${next.time}`
      : last
        ? `Zuletzt: ${formatDate(last.date)}`
        : 'Kein Termin';
    // ICD-Badges
    const codes=(p.diagCodes||[]).map(x=>{
      const sicherheit=x.sicherheit?` <span style="font-size:9px;font-weight:700;padding:0 3px;border-radius:2px;background:${x.sicherheit==='G'?'var(--teal-bg)':'var(--amber-bg)'};color:${x.sicherheit==='G'?'var(--teal-text)':'var(--amber-text)'}">${x.sicherheit}</span>`:'';
      return`<span style="font-size:10px;background:var(--purple-bg);color:var(--purple-text);padding:1px 5px;border-radius:3px;font-weight:500">${esc(x.c)}${sicherheit}</span>`;
    }).join(' ');
    // Prozess-Badge
    const processBadge=(()=>{
      const ta=p.therapieantrag||{};
      const probDone=pAppts.filter(a=>a.type==='probatorik'&&apptHasPassed(a)).length;
      // In Therapie erkennbar aus letzten Terminen
      const recentTypes=pAppts.filter(a=>SESSION_TYPES.has(a.type)&&a.type!=='probatorik'&&apptHasPassed(a)).map(a=>a.type);
      const hasET=recentTypes.includes('et');
      const hasGT=recentTypes.includes('gt');
      const hasSelbst=recentTypes.includes('selbst')||recentTypes.includes('privat');
      if(ta.kostenzusage&&ta.kostenzusage.done){
        const form=hasGT?'Gruppentherapie':hasSelbst?'Selbstzahler':'Einzeltherapie';
        return`<span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:var(--teal-bg);color:var(--teal-text)">${form}</span>`;
      }
      if(ta.konsiliBeantragt&&ta.konsiliBeantragt.done){
        const step=ta.kostenzusage?.done?'Kostenzusage':ta.antragEingereicht?.done?'Antrag eingereicht':ta.antragAusgefuellt?.done?'Antrag i. Bearb.':ta.konsiliErstellt?.done?'Konsili erhalten':'Antrag läuft';
        return`<span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:var(--blue-bg,#e8f0fe);color:var(--blue)">${step}</span>`;
      }
      if(probDone>=5){
        return`<span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:var(--amber-bg);color:var(--amber-text)">Probatorik abgeschlossen</span>`;
      }
      if(probDone>0){
        return`<span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:var(--surface2);color:var(--text2)">Probatorik ${probDone}/5</span>`;
      }
      return'';
    })();
    return`<div class="patient-row" onclick="showPatient('${p.id}')">
      <div class="av ${avColor(p.name)}">${avInitials(p.name)}</div>
      <div class="patient-info">
        <div class="patient-name">${esc(p.name)}</div>
        <div class="patient-meta" style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
          ${processBadge}${codes}
          <span style="color:var(--text3)">${terminLabel}</span>
        </div>
      </div>
      <div class="patient-right">
        <div class="pstat"><div class="pstat-val">${sessLabel}</div><div class="pstat-lbl">Sitzungen</div></div>
        <span class="badge badge-${p.status||'active'}">${p.status==='pause'?'Pause':p.status==='done'?'Abgeschlossen':'Aktiv'}</span>
      </div>
    </div>`;
  }).join('');
}
function filterPatients(v){
  if(currentSubTab==='patienten-archiv') renderArchiv(v);
  else renderPatients(v);
}

// ── Archiv ────────────────────────────────────────────────────────────────────
function renderArchiv(filter=''){
  const patients=loadPatients().filter(p=>p.status==='done');
  const appts=loadAppts();
  const fl=(filter||'').toLowerCase();
  let fp=patients.filter(p=>{
    if(!fl)return true;
    if(p.name.toLowerCase().includes(fl))return true;
    return(p.diagCodes||[]).some(x=>x.c.toLowerCase().includes(fl)||x.n.toLowerCase().includes(fl));
  });
  fp.sort((a,b)=>a.name.split(',')[0].trim().toLowerCase().localeCompare(b.name.split(',')[0].trim().toLowerCase(),'de'));
  const list=document.getElementById('archiv-list');
  if(!fp.length){
    list.innerHTML=`<div class="empty">${patients.length?'Keine Treffer.':'Noch keine archivierten Patienten.'}</div>`;
    return;
  }
  list.innerHTML=fp.map(p=>{
    const pAppts=appts.filter(a=>a.patientId===p.id);
    const sessCount=pAppts.filter(a=>SESSION_TYPES.has(a.type)&&apptHasPassed(a)).length;
    const allDates=pAppts.filter(a=>SESSION_TYPES.has(a.type)).map(a=>a.date).sort();
    const first=allDates[0], last=allDates[allDates.length-1];
    const zeitraum=first&&last?`${formatDate(first)} – ${formatDate(last)}`:'–';
    const codes=(p.diagCodes||[]).map(x=>{
      const s=x.sicherheit||'V';
      return`<span style="font-size:10px;background:var(--purple-bg);color:var(--purple-text);padding:1px 5px;border-radius:3px;font-weight:500">${esc(x.c)} <span style="font-size:9px;opacity:.7">${s}</span></span>`;
    }).join(' ');
    return`<div class="patient-row" onclick="showPatient('${p.id}')" style="opacity:.85">
      <div class="av ${avColor(p.name)}" style="filter:grayscale(.6)">${avInitials(p.name)}</div>
      <div class="patient-info">
        <div class="patient-name" style="color:var(--text2)">${esc(p.name)}</div>
        <div class="patient-meta" style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
          ${codes}
          <span style="color:var(--text3)">${zeitraum}</span>
        </div>
      </div>
      <div class="patient-right" style="gap:6px">
        <div class="pstat"><div class="pstat-val">${sessCount}</div><div class="pstat-lbl">Sitzungen</div></div>
        <button onclick="event.stopPropagation();reactivatePatient('${p.id}')" class="btn" style="font-size:11px;padding:4px 8px;color:var(--teal-text);border-color:var(--teal-text)">Reaktivieren</button>
      </div>
    </div>`;
  }).join('');
}

function reactivatePatient(id){
  if(!confirm('Patient reaktivieren und zurück in die aktive Liste verschieben?'))return;
  const patients=loadPatients();
  const p=patients.find(x=>x.id===id);
  if(!p)return;
  p.status='active';
  savePatients(patients);
  showToast('Patient reaktiviert.');
  renderArchiv(document.getElementById('psearch').value);
}

function showPatient(id){
  const p=loadPatients().find(x=>x.id===id);if(!p)return;
  const appts=loadAppts().filter(a=>a.patientId===id).sort((a,b)=>b.date.localeCompare(a.date));
  const sessCount=appts.filter(a=>SESSION_TYPES.has(a.type)&&apptHasPassed(a)).length;
  const phoneCount=appts.filter(a=>a.type==='telefon'&&apptHasPassed(a)).length;
  const next=appts.filter(a=>a.date>=todayStr()&&a.type!=='canceled'&&a.type!=='noshow').sort((a,b)=>a.date.localeCompare(b.date))[0];
  const codes=(p.diagCodes||[]).map(x=>{
    const s=x.sicherheit||'V';
    const sBg=s==='G'?'var(--teal-bg)':'var(--amber-bg)';
    const sCol=s==='G'?'var(--teal-text)':'var(--amber-text)';
    const sBorder=s==='G'?'var(--teal-text)':'var(--amber)';
    return`<div style="margin-bottom:4px;display:flex;align-items:center;gap:6px"><span style="font-weight:600;color:var(--purple)">${esc(x.c)}</span><span style="font-size:11px;font-weight:700;padding:1px 6px;border-radius:3px;border:1px solid ${sBorder};background:${sBg};color:${sCol}">${s==='G'?'gesichert':'Verdacht'}</span><span style="font-size:13px;color:var(--text)">${esc(x.n)}</span></div>`;
  }).join('');
  const rows=appts.map(a=>`<div class="srow">
    <span class="srow-date">${formatDate(a.date)}</span>
    <span style="font-size:10px;color:var(--text2);width:45px;flex-shrink:0">${a.time||'–'}</span>
    <span class="srow-type"><span class="appt-dot ${TYPE_COLOR[a.type]||'et'}">${TYPE_LABEL[a.type]||a.type}</span></span>
    <span class="srow-dur">${a.dur} min</span>
    ${a.note?`<span style="font-size:11px;color:var(--text3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(a.note)}">${esc(a.note)}</span>`:''}
  </div>`).join('');

  // Probatorik progress: nur bereits stattgefundene Sitzungen (Datum <= heute) gelten
  // als abgeschlossen; künftig gebuchte werden separat als "geplant" ausgewiesen.
  const probAll=appts.filter(a=>a.type==='probatorik');
  const probDone=probAll.filter(a=>apptHasPassed(a)).length;
  const probPlanned=probAll.filter(a=>!apptHasPassed(a)).length;
  const probDots=Array.from({length:5},(_,i)=>{
    const done=i<probDone, planned=!done&&i<probDone+probPlanned;
    const border=done?'var(--amber)':planned?'var(--amber)':'var(--border)';
    const bg=done?'var(--amber-bg)':'transparent';
    const color=done?'var(--amber-text)':planned?'var(--amber-text)':'var(--text3)';
    const style=planned?'border-style:dashed':'';
    return`<div title="${done?'stattgefunden':planned?'geplant':'frei'}" style="width:28px;height:28px;border-radius:50%;border:2px solid ${border};${style};background:${bg};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:${color}">${i+1}</div>`;
  }).join('');
  const probWarning = probDone>=5
    ? `<div style="margin-top:10px;padding:8px 12px;background:var(--teal-bg);border:1px solid var(--teal-text);border-radius:var(--radius);font-size:12px;color:var(--teal-text);display:flex;align-items:center;gap:8px">✅ Alle 5 Probatorik-Sitzungen abgeschlossen.</div>`
    : probDone===4
    ? `<div style="margin-top:10px;padding:8px 12px;background:var(--amber-bg);border:1px solid var(--amber);border-radius:var(--radius);font-size:12px;color:var(--amber-text);display:flex;align-items:center;gap:8px">⚠️ <strong>Hinweis:</strong> Nächste Sitzung ist die letzte Probatorik-Sitzung (5/5). Bitte Therapieantrag vorbereiten.</div>`
    : '';
  const probSection=`<div class="drow" style="flex-direction:column;align-items:flex-start;gap:8px">
    <span class="drow-lbl">Probatorik-Sitzungen</span>
    <div style="display:flex;gap:6px;align-items:center">${probDots}<span style="font-size:12px;color:var(--text2);margin-left:4px">${probDone}/5${probPlanned>0?` · ${probPlanned} geplant`:''}</span></div>
    ${probWarning}
  </div>`;

  // Therapieantrag-Checkliste
  const ta=p.therapieantrag||{};
  const probAuto=probDone>=5;
  function taRowHTML(cfg){
    const val=ta[cfg.key];
    const done=cfg.auto?probAuto:!!(val&&val.done);
    const date=val&&val.date?val.date:'';
    const chkStyle=`width:16px;height:16px;accent-color:var(--teal);cursor:${cfg.auto?'default':'pointer'}`;
    const dateInput=!cfg.auto
      ?`<input type="date" value="${date}" id="ta-date-${cfg.key}" style="border:1px solid var(--border);border-radius:4px;font-size:11px;padding:2px 6px;color:var(--text);background:var(--surface);font-family:inherit"${done?'':' disabled'}>`
      :(done?`<span style="font-size:11px;color:var(--teal-text)">&#10003; automatisch</span>`:'<span style="font-size:11px;color:var(--text3)">ausstehend</span>');
    return`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border-2,#eee)">
      <input type="checkbox" id="ta-chk-${cfg.key}"${done?' checked':''}${cfg.auto?' disabled':''} style="${chkStyle}">
      <span style="flex:1;font-size:13px;color:${done?'var(--text)':'var(--text2)'}">${cfg.label}</span>
      ${dateInput}
    </div>`;
  }
  const therapieSection=`<div class="drow" style="flex-direction:column;align-items:flex-start;gap:4px">
    <span class="drow-lbl" style="margin-bottom:4px">Therapieantrag-Prozess</span>
    ${TA_KEYS.map(taRowHTML).join('')}
  </div>`;

  document.getElementById('detail-content').innerHTML=`
    <div class="detail-card">
      <div class="detail-header">
        <div class="av ${avColor(p.name)}" style="width:44px;height:44px;font-size:14px">${avInitials(p.name)}</div>
        <div style="flex:1"><div style="font-size:16px;font-weight:600;color:var(--text)">${esc(p.name)}</div><div style="font-size:13px;color:var(--text2)">${TYPE_LABEL[p.type]||'–'}</div></div>
        <button class="btn" onclick="openEditPatient('${p.id}')">Bearbeiten</button>
      </div>
      <div>
        <div class="drow"><span class="drow-lbl">Geburtsdatum</span><span class="drow-val">${formatDate(p.dob)}</span></div>
        ${p.phone?`<div class="drow"><span class="drow-lbl">Telefon</span><span class="drow-val">${esc(p.phone)}</span></div>`:''}
        ${p.email?`<div class="drow"><span class="drow-lbl">E-Mail</span><span class="drow-val">${esc(p.email)}</span></div>`:''}
        <div class="drow"><span class="drow-lbl">Sitzungen gesamt</span><span class="drow-val">${sessCount}${phoneCount>0?` <span style="font-size:11px;color:var(--text3);font-weight:400">+ ${phoneCount} Telefonat${phoneCount!==1?'e':''}</span>`:''}</span></div>
        <div class="drow"><span class="drow-lbl">Nächster Termin</span><span class="drow-val">${next?formatDate(next.date)+' '+next.time:'–'}</span></div>
        <div class="drow"><span class="drow-lbl">Status</span><span class="drow-val"><span class="badge badge-${p.status||'active'}">${p.status==='pause'?'Pause':p.status==='done'?'Abgeschlossen':'Aktiv'}</span></span></div>
        ${probSection}
        ${therapieSection}
        ${p.diagCodes&&p.diagCodes.length?`<div class="drow" style="flex-direction:column;align-items:flex-start;gap:6px"><span class="drow-lbl" style="margin-bottom:4px">Diagnosen (ICD-10)</span><div>${codes}</div></div>`:''}
        ${p.notes?`<div class="drow" style="flex-direction:column;align-items:flex-start;gap:4px"><span class="drow-lbl">Notizen</span><span style="font-size:13px;color:var(--text)">${esc(p.notes)}</span></div>`:''}
      </div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div class="section-title" style="margin:0">Termine (${appts.length})</div>
      <button class="btn btn-primary" onclick="openNewApptPatient('${p.id}')">+ Termin</button>
    </div>
    ${appts.length?`<div class="detail-card">${rows}</div>`:`<div class="empty" style="padding:1rem">Noch keine Termine.</div>`}
    <div style="margin-top:1rem;text-align:right"><button class="btn btn-danger" onclick="deletePatient('${p.id}')">Patient löschen</button></div>`;
  // Attach event listeners for Therapieantrag checkboxes (Option B: no inline handlers)
  TA_KEYS.filter(cfg=>!cfg.auto).forEach(cfg=>{
    const chk=document.getElementById('ta-chk-'+cfg.key);
    const dateEl=document.getElementById('ta-date-'+cfg.key);
    if(!chk||!dateEl)return;
    chk.addEventListener('change',()=>{
      dateEl.disabled=!chk.checked;
      if(chk.checked&&!dateEl.value){
        dateEl.value=todayStr();
      }
      saveTA(p.id, cfg.key, chk.checked, dateEl.value);
    });
    dateEl.addEventListener('change',()=>{
      saveTA(p.id, cfg.key, chk.checked, dateEl.value);
    });
  });
  _detailBackTarget='patienten-liste';
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-detail').classList.add('active');
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.tab[onclick="switchTab('patienten')"]`).classList.add('active');
}
function showPatients(){
  _detailBackTarget='patienten-liste';
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-patienten').classList.add('active');
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.tab[onclick="switchTab('patienten')"]`).classList.add('active');
  switchSubTab('patienten-liste');
}

// ── Patient CRUD ──────────────────────────────────────────────────────────────
function openNewPatient(){
  document.getElementById('modal-patient-title').textContent='Neuer Patient';
  ['pt-name','pt-dob','pt-phone','pt-email','pt-notes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('pt-type').value='probatorik';
  document.getElementById('pt-status').value='active';
  document.getElementById('pt-edit-id').value='';
  document.getElementById('pt-wl-source-id').value='';
  document.getElementById('icd-search').value='';
  loadICDsIntoForm([]);
  document.getElementById('modal-patient').classList.remove('hidden');
}
function openEditPatient(id){
  const p=loadPatients().find(x=>x.id===id);if(!p)return;
  document.getElementById('modal-patient-title').textContent='Patient bearbeiten';
  document.getElementById('pt-name').value=p.name||'';
  document.getElementById('pt-dob').value=p.dob||'';
  document.getElementById('pt-phone').value=p.phone||'';
  document.getElementById('pt-email').value=p.email||'';
  document.getElementById('pt-notes').value=p.notes||'';
  document.getElementById('pt-type').value=p.type||'probatorik';
  document.getElementById('pt-status').value=p.status||'active';
  document.getElementById('pt-edit-id').value=id;
  document.getElementById('pt-wl-source-id').value='';
  document.getElementById('icd-search').value='';
  loadICDsIntoForm(p.diagCodes||[]);
  document.getElementById('modal-patient').classList.remove('hidden');
}
function savePatient(){
  const name=document.getElementById('pt-name').value.trim();
  if(!name){alert('Bitte Name eingeben.');return}
  const dob=document.getElementById('pt-dob').value;
  const patients=loadPatients();
  const editId=document.getElementById('pt-edit-id').value;
  const wlSourceId=document.getElementById('pt-wl-source-id').value;

  // Duplicate check: same name (case-insensitive) + same dob
  if(!editId){
    const nameLower=name.toLowerCase().replace(/\s+/g,'');
    const duplicate=patients.find(p=>{
      const pName=p.name.toLowerCase().replace(/\s+/g,'');
      const nameMatch=pName===nameLower||pName.includes(nameLower)||nameLower.includes(pName);
      const dobMatch=dob&&p.dob&&p.dob===dob;
      return nameMatch&&dobMatch;
    });
    if(duplicate){
      if(!confirm(`⚠️ Mögliche Doppelaufnahme:\n\nEs existiert bereits ein Patient mit ähnlichem Namen und gleichem Geburtsdatum:\n"${duplicate.name}" (${formatDate(duplicate.dob)})\n\nTrotzdem speichern?`))return;
    } else {
      // Softer check: just name similarity without dob
      const nameOnlyDup=dob?null:patients.find(p=>{
        const pName=p.name.toLowerCase().replace(/\s+/g,'');
        return pName===nameLower;
      });
      if(nameOnlyDup){
        if(!confirm(`⚠️ Hinweis:\n\nEin Patient mit dem Namen "${nameOnlyDup.name}" existiert bereits.\n\nTrotzdem als neuen Patienten speichern?`))return;
      }
    }
  }

  const diagCodes=JSON.parse(document.getElementById('pt-diag-codes').value||'[]');
  const data={name,dob,phone:document.getElementById('pt-phone').value.trim(),email:document.getElementById('pt-email').value.trim(),notes:document.getElementById('pt-notes').value.trim(),type:document.getElementById('pt-type').value,status:document.getElementById('pt-status').value,diagCodes};
  const prevStatus=editId?(patients.find(x=>x.id===editId)||{}).status:null;
  if(editId){const i=patients.findIndex(x=>x.id===editId);if(i>=0)patients[i]={...patients[i],...data}}
  else patients.push({id:uid(),...data});
  savePatients(patients);

  // Remove from waitlist if converted
  if(wlSourceId){
    saveWaitlist(loadWaitlist().filter(x=>x.id!==wlSourceId));
  }

  closeModal('modal-patient');renderMetrics();
  const nowDone=data.status==='done';
  const justArchived=nowDone&&prevStatus!=='done';
  if(editId)showPatient(editId);else renderPatients();
  if(justArchived){
    showToast('Patient abgeschlossen und ins Archiv verschoben.');
  } else {
    showToast(editId?'Patient aktualisiert.':`Patient gespeichert.${wlSourceId?' Aus Warteliste entfernt.':''}`);
  }
}
function deletePatient(id){
  if(!confirm('Patient und alle Termine wirklich löschen?'))return;
  savePatients(loadPatients().filter(x=>x.id!==id));
  saveAppts(loadAppts().filter(a=>a.patientId!==id));
  showPatients();renderMetrics();showToast('Patient gelöscht.');
}

// ── Slot picker ───────────────────────────────────────────────────────────────
const SLOTS_SINGLE=[{t:'09:00',d:60,l:'09:00 – 10:00'},{t:'10:00',d:60,l:'10:00 – 11:00'},{t:'11:00',d:60,l:'11:00 – 12:00'},{t:'13:00',d:60,l:'13:00 – 14:00'},{t:'14:00',d:60,l:'14:00 – 15:00'},{t:'15:00',d:60,l:'15:00 – 16:00'},{t:'16:00',d:60,l:'16:00 – 17:00'}];
const SLOTS_GROUP=[{t:'09:00',d:120,l:'09:00 – 11:00'},{t:'15:00',d:120,l:'15:00 – 17:00'}];

function updateSlots(selectedTime){
  const type=document.getElementById('appt-type').value;
  const slots=type==='gt'?SLOTS_GROUP:SLOTS_SINGLE;
  const wrap=document.getElementById('slot-buttons');
  const date=document.getElementById('appt-date').value;
  const editId=document.getElementById('appt-edit-id').value;
  const bookedAppts=loadAppts().filter(a=>a.date===date&&a.type!=='canceled'&&a.id!==editId);
  const toMin=t=>parseInt(t.split(':')[0])*60+parseInt(t.split(':')[1]);
  function overlaps(slotStart,slotDur){
    const sStart=toMin(slotStart),sEnd=sStart+slotDur;
    return bookedAppts.some(a=>{const bStart=toMin(a.time||'00:00'),bEnd=bStart+(a.dur||60);return sStart<bEnd&&sEnd>bStart;});
  }
  const curTime=selectedTime||document.getElementById('appt-time').value||'';
  wrap.innerHTML=slots.map(s=>{
    const active=s.t===curTime;
    const blocked=overlaps(s.t,s.d);
    if(blocked&&!active){
      return`<button type="button" disabled title="Zeitraum bereits belegt" style="padding:7px 13px;font-size:13px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface2);color:var(--text3);cursor:not-allowed;font-family:inherit;text-decoration:line-through;opacity:.5">${s.l}</button>`;
    }
    return`<button type="button" onclick="selectSlot('${s.t}',${s.d})" style="padding:7px 13px;font-size:13px;border-radius:var(--radius);border:1px solid ${active?'var(--purple)':'var(--border)'};background:${active?'var(--purple-bg)':'var(--surface)'};color:${active?'var(--purple-text)':'var(--text)'};cursor:pointer;font-family:inherit;font-weight:${active?'600':'400'}">${s.l}</button>`;
  }).join('');
  if(!curTime){
    const firstFree=slots.find(s=>!overlaps(s.t,s.d));
    if(firstFree){
      document.getElementById('appt-time').value=firstFree.t;
      document.getElementById('appt-dur').value=firstFree.d;
      updateSlots(firstFree.t);
    }
  }
}

function selectSlot(time,dur){
  document.getElementById('appt-time').value=time;
  document.getElementById('appt-dur').value=dur;
  updateSlots(time);
}

// ── Appointment CRUD ──────────────────────────────────────────────────────────
function populatePatientSelect(selectedId){
  const sel=document.getElementById('appt-patient');
  const patients=loadPatients().filter(p=>!p.status||p.status==='active');
  sel.innerHTML='<option value="">– Patient wählen –</option>'+patients.map(p=>`<option value="${p.id}"${p.id===selectedId?' selected':''}>${esc(p.name)}</option>`).join('');

}

function checkProbatorik(patientId){
  const opt=document.querySelector('#appt-type option[value="probatorik"]');
  if(!opt)return;
  if(!patientId){
    opt.disabled=false;
    opt.textContent='Probatorik';
    return;
  }
  const count=loadAppts().filter(a=>a.patientId===patientId&&a.type==='probatorik').length;
  if(count>=5){
    opt.disabled=true;
    opt.textContent='Probatorik (5/5 erreicht)';

    if(document.getElementById('appt-type').value==='probatorik'){

      onApptTypeChange();
    }
  } else {
    opt.disabled=false;
    opt.textContent=`Probatorik (${count}/5)`;
  }
}

function saveAppt(){
  const type=document.getElementById('appt-type').value;
  const date=document.getElementById('appt-date').value;
  const time=document.getElementById('appt-time').value;
  const dur=parseInt(document.getElementById('appt-dur').value);
  const note=document.getElementById('appt-note').value.trim();
  const editId=document.getElementById('appt-edit-id').value;
  if(!date){alert('Bitte Datum wählen.');return}
  if(!time){alert('Bitte einen Zeitslot wählen.');return}
  const toMin=t=>parseInt(t.split(':')[0])*60+parseInt(t.split(':')[1]);
  const sStart=toMin(time),sEnd=sStart+dur;
  const appts=loadAppts();

  if(type==='gt'){
    // Group booking — create one appt per member
    const groupId=document.getElementById('appt-group').value;
    if(!groupId){alert('Bitte eine Gruppe wählen.');return}
    const group=loadGroups().find(x=>x.id===groupId);
    if(!group||(group.memberIds||[]).length===0){alert('Diese Gruppe hat keine Mitglieder.');return}
    // Check slot not already taken
    const conflict=appts.find(a=>{
      if(a.date!==date||a.type==='canceled'||a.id===editId)return false;
      const bStart=toMin(a.time||'00:00'),bEnd=bStart+(a.dur||60);
      return sStart<bEnd&&sEnd>bStart;
    });
    if(conflict){alert('Dieser Zeitraum ist bereits belegt.');return}
    const newAppts=group.memberIds.map(pid=>({id:uid(),patientId:pid,date,time,type,dur,note,groupId}));
    saveAppts([...appts,...newAppts]);
    closeModal('modal-appt');renderMetrics();
    if(currentTab==='kalender')renderCal();
    if(currentTab==='heute')renderHeute();
    showToast(`${newAppts.length} Gruppentherapie-Termine gespeichert.`);
  } else {
    // Single patient booking
    const patientId=document.getElementById('appt-patient').value;
    if(!patientId){alert('Bitte Patient wählen.');return}
    const conflict=type!=='telefon'&&appts.find(a=>{
      if(a.date!==date||a.type==='canceled'||a.type==='telefon'||a.id===editId)return false;
      const bStart=toMin(a.time||'00:00'),bEnd=bStart+(a.dur||60);
      return sStart<bEnd&&sEnd>bStart;
    });
    if(conflict){alert('Dieser Zeitraum ist bereits belegt.');return}
    const data={patientId,date,time,type,dur,note};
    if(editId){const i=appts.findIndex(x=>x.id===editId);if(i>=0)appts[i]={...appts[i],...data}}
    else appts.push({id:uid(),...data});
    saveAppts(appts);closeModal('modal-appt');renderMetrics();
    if(currentTab==='kalender')renderCal();
    if(currentTab==='heute')renderHeute();
    showToast(editId?'Termin aktualisiert.':'Termin gespeichert.');
  }
}
function deleteAppt(id,dateKey){
  if(!confirm('Termin löschen?'))return;
  saveAppts(loadAppts().filter(x=>x.id!==id));
  renderMetrics();
  if(dateKey)showDay(dateKey);
  showToast('Termin gelöscht.');
}

  document.getElementById('stats-content').innerHTML=`

      </div>
      <div class="stat-card">
        <div class="stat-card-title">Ausfälle & Verlegungen</div>
        <div class="bar-row"><div class="bar-lbl">Echter Ausfall</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(canceledCount/maxT*100)}%;background:#dc2626"></div></div><div class="bar-num">${canceledCount}</div></div>
        <div class="bar-row"><div class="bar-lbl">No-Show</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(noshowCount/maxT*100)}%;background:#7f1d1d"></div></div><div class="bar-num">${noshowCount}</div></div>
        <div class="bar-row"><div class="bar-lbl">Verlegt</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(rescheduledCount/maxT*100)}%;background:#9ca3af"></div></div><div class="bar-num">${rescheduledCount}</div></div>

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Methodenberatung (v8.2)</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#F6F5F1;
  --s0:#FFFFFF;
  --s1:#EEECEA;
  --s2:#E4E2DE;
  --b1:#DDDBD6;
  --b2:#C4C2BC;
  --t1:#1A1916;
  --t2:#6C6A64;
  --t3:#AAA89F;
  --blue:#2F68B0;
  --blue-bg:#E8F0FB;
  --blue-mid:#C5D8F5;
  --green:#1B7A4E;
  --green-bg:#E5F4EC;
  --amber:#9A5B10;
  --amber-bg:#FBF0E0;
  --red:#9B2828;
  --red-bg:#FBEAEA;
  --purple:#5A44B0;
  --purple-bg:#EDEBFC;
  --teal:#1A7A72;
  --teal-bg:#E4F5F3;
  --r:6px; --rl:10px;
  --shadow:0 1px 3px rgba(0,0,0,.07);
}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  background:var(--bg);color:var(--t1);min-height:100vh;font-size:14px;line-height:1.5
}

/* ── Shell ── */
.topbar{
  background:var(--s0);border-bottom:1px solid var(--b1);
  padding:0 1.5rem;height:50px;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:60;gap:10px
}
.brand{font-size:14px;font-weight:600;letter-spacing:-.2px;white-space:nowrap}
.brand em{font-style:normal;color:var(--blue)}
.nav{display:flex;gap:1px;background:var(--s1);border-radius:var(--r);padding:2px;border:1px solid var(--b1)}
.nav-btn{padding:5px 13px;font-size:12px;font-weight:500;border:none;background:transparent;
         border-radius:4px;cursor:pointer;color:var(--t2);font-family:inherit;
         transition:color .12s,background .12s;white-space:nowrap}
.nav-btn:hover{color:var(--t1)}
.nav-btn.active{background:var(--s0);color:var(--t1);box-shadow:var(--shadow);border:1px solid var(--b1)}
.topbar-right{display:flex;gap:6px;flex-shrink:0}
.main{max-width:940px;margin:0 auto;padding:1.5rem 1.25rem}

/* ── Buttons ── */
.btn{
  display:inline-flex;align-items:center;gap:5px;padding:6px 13px;
  border:1px solid var(--b1);background:var(--s0);border-radius:var(--r);
  font-size:13px;font-weight:500;color:var(--t1);cursor:pointer;
  font-family:inherit;transition:background .12s,border-color .12s;white-space:nowrap
}
.btn:hover{background:var(--s1);border-color:var(--b2)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{opacity:.87;background:var(--blue)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-ghost{border-color:transparent;background:transparent;color:var(--t2);padding:4px 8px}
.btn-ghost:hover{background:var(--s1);color:var(--t1);border-color:var(--b1)}
.btn-danger{background:var(--red-bg);color:var(--red);border-color:transparent}
.btn-danger:hover{border-color:var(--red)}

/* ── Panels ── */
.panel{display:none}.panel.active{display:block}

/* ── Metrics ── */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.5rem}
.metric{background:var(--s0);border:1px solid var(--b1);border-radius:var(--rl);padding:14px 16px}
.metric-val{font-size:26px;font-weight:700;color:var(--t1);line-height:1}
.metric-label{font-size:11px;color:var(--t2);margin-top:5px;text-transform:uppercase;letter-spacing:.4px}
.metric-sub{font-size:11px;color:var(--t3);margin-top:2px}

/* ── Section headers ── */
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-title{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px}

/* ── Dashboard two-col ── */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:680px){.dash-grid{grid-template-columns:1fr}}

/* ── Card / Row items ── */
.card{background:var(--s0);border:1px solid var(--b1);border-radius:var(--rl);padding:.9rem 1rem;box-shadow:var(--shadow)}
.row-item{
  display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:var(--r);
  border:1px solid var(--b1);margin-bottom:5px;cursor:pointer;background:var(--s0);
  transition:border-color .12s,background .12s;box-shadow:var(--shadow)
}
.row-item:hover{border-color:var(--b2);background:var(--s1)}
.row-body{flex:1;min-width:0}
.row-name{font-size:13px;font-weight:600;color:var(--t1)}
.row-title{font-size:12px;color:var(--t2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-meta{font-size:11px;color:var(--t3);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.row-aside{display:flex;align-items:center;gap:7px;flex-shrink:0}

/* ── Timeline (Heute + Dashboard) ── */
.tl-wrap{display:flex;flex-direction:column;gap:5px}
.tl-item{display:flex;gap:10px;align-items:stretch}
.tl-time{width:50px;flex-shrink:0;text-align:right;padding-top:4px}
.tl-time-h{font-size:12px;font-weight:600;color:var(--t2)}
.tl-time-end{font-size:10px;color:var(--t3)}
.tl-bar{width:3px;border-radius:2px;flex-shrink:0;background:var(--b2)}
.tl-bar.blue{background:var(--blue)}
.tl-bar.green{background:var(--green)}
.tl-bar.red{background:var(--red)}
.tl-bar.gray{background:var(--b2)}
.tl-card{
  flex:1;background:var(--s0);border:1px solid var(--b1);border-radius:var(--r);
  padding:8px 11px;cursor:pointer;transition:border-color .12s,background .12s
}
.tl-card:hover{border-color:var(--b2);background:var(--s1)}
.tl-card-name{font-size:13px;font-weight:500;color:var(--t1)}
.tl-card-meta{font-size:11px;color:var(--t2);margin-top:2px;display:flex;gap:7px;flex-wrap:wrap;align-items:center}

/* Quick-note inline after marking done */
.quick-note-bar{display:flex;gap:6px;margin-top:6px}
.quick-note-bar textarea{
  flex:1;padding:5px 8px;border:1px solid var(--b1);border-radius:var(--r);
  font-size:12px;background:var(--bg);color:var(--t1);font-family:inherit;
  outline:none;resize:none;line-height:1.4;max-height:80px
}
.quick-note-bar textarea:focus{border-color:var(--blue)}
.quick-note-dur{display:flex;align-items:center;gap:8px;margin-top:6px}
.quick-note-dur label{font-size:11px;color:var(--t2)}
.quick-note-dur input{width:80px;padding:4px 7px;border:1px solid var(--b1);border-radius:var(--r);
  font-size:12px;background:var(--bg);color:var(--t1);font-family:inherit;outline:none}
.quick-note-dur input:focus{border-color:var(--blue)}

/* ── Deadline banner ── */
.dl-banner{
  background:var(--amber-bg);border:1px solid #E8C87A;border-radius:var(--r);
  padding:7px 12px;margin-bottom:5px;display:flex;align-items:center;
  justify-content:space-between;font-size:12px;cursor:pointer;
  transition:background .12s
}
.dl-banner:hover{background:#F5E8C0}
.dl-banner strong{color:var(--amber)}

/* ── Badges ── */
.badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:11px;font-weight:500;white-space:nowrap;line-height:1.5}
.s-neu{background:var(--s2);color:var(--t2)}
.s-angefragt{background:var(--amber-bg);color:var(--amber)}
.s-terminiert{background:var(--blue-bg);color:var(--blue)}
.s-laufend{background:var(--green-bg);color:var(--green)}
.s-wartet{background:var(--purple-bg);color:var(--purple)}
.s-abgeschlossen{background:var(--s1);color:var(--t3)}
.p-hoch{background:var(--red-bg);color:var(--red);font-size:10px}
.f-online{background:var(--blue-bg);color:var(--blue)}
.f-praesent{background:var(--green-bg);color:var(--green)}
.f-telefonisch{background:var(--amber-bg);color:var(--amber)}
.a-geplant{background:var(--blue-bg);color:var(--blue)}
.a-erledigt{background:var(--green-bg);color:var(--green)}
.a-abgesagt{background:var(--red-bg);color:var(--red)}

/* ── Qual / Quant ── */
.qq-quant{background:#E8F0FB;color:#1A4F9A;font-weight:600;border:1px solid #C5D8F5}
.qq-quali{background:#F0EBFC;color:#4A2FA0;font-weight:600;border:1px solid #D5C8F5}
.qq-gemischt{background:#FBF0E0;color:#7A4010;font-weight:600;border:1px solid #F0D4A0}

/* ── Statistik ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin-bottom:1.25rem}
.stat-card{background:var(--s0);border:1px solid var(--b1);border-radius:var(--rl);padding:.9rem 1rem;box-shadow:var(--shadow)}
.stat-card-title{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-lbl{font-size:12px;color:var(--t2);width:120px;flex-shrink:0;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:14px;background:var(--s2);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .3s}
.bar-num{font-size:12px;color:var(--t2);width:24px;text-align:right;flex-shrink:0}
.stat-big{font-size:28px;font-weight:700;color:var(--t1);line-height:1}
.stat-sub{font-size:12px;color:var(--t2);margin-top:4px}
.rep-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--b1);font-size:13px}
.rep-row:last-child{border-bottom:none}

/* ── Search + filter ── */
.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.search-inp{
  flex:1;min-width:160px;padding:7px 10px;border:1px solid var(--b1);border-radius:var(--r);
  font-size:13px;background:var(--s0);color:var(--t1);font-family:inherit;outline:none
}
.search-inp:focus{border-color:var(--blue)}
.filter-sel{
  padding:7px 10px;border:1px solid var(--b1);border-radius:var(--r);
  font-size:12px;background:var(--s0);color:var(--t1);font-family:inherit;outline:none;cursor:pointer
}
.filter-sel:focus{border-color:var(--blue)}

/* ── Kalender ── */
.cal-nav{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.cal-title{font-size:15px;font-weight:600;color:var(--t1);flex:1;text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-hdr{text-align:center;font-size:10px;color:var(--t3);padding:4px 0;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.cal-day{
  min-height:66px;border-radius:var(--r);border:1px solid var(--b1);padding:5px;
  background:var(--s0);cursor:pointer;transition:border-color .12s
}
.cal-day:hover{border-color:var(--b2)}
.cal-day.other-month{opacity:.28;pointer-events:none}
.cal-day.today{border-color:var(--blue);border-width:2px}
.cal-day-num{font-size:11px;font-weight:500;color:var(--t2)}
.cal-day.today .cal-day-num{color:var(--blue);font-weight:700}
.cal-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin:1px}

/* ── Detail ── */
.back-btn{
  display:inline-flex;align-items:center;gap:4px;background:none;border:none;
  cursor:pointer;color:var(--blue);font-size:13px;padding:0 0 1rem;font-family:inherit
}
.detail-layout{display:grid;grid-template-columns:280px 1fr;gap:14px;align-items:start}
@media(max-width:720px){.detail-layout{grid-template-columns:1fr}}
.drow{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;font-size:13px;border-bottom:1px solid var(--b1)}
.drow:last-child{border-bottom:none}
.drow-lbl{color:var(--t2);flex-shrink:0;margin-right:10px}
.drow-val{color:var(--t1);font-weight:500;text-align:right;word-break:break-word;max-width:65%}
.blk-title{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin:1rem 0 7px}
.next-step{
  background:var(--blue-bg);border-left:3px solid var(--blue);
  border-radius:0 var(--r) var(--r) 0;padding:10px 13px;font-size:13px;
  color:var(--blue);font-weight:500;line-height:1.5
}
.notiz-box{
  background:var(--s1);border-radius:var(--r);padding:11px 13px;font-size:13px;
  color:var(--t1);line-height:1.65;white-space:pre-wrap;word-break:break-word;min-height:52px
}
.notiz-empty{color:var(--t3);font-style:italic}
.note-rendered{white-space:normal}
.note-rendered .note-list{margin:6px 0;padding-left:20px}
.note-rendered .note-list li{margin:2px 0}
.note-rendered strong{font-weight:700}
.note-rendered em{font-style:italic}
.note-hint{font-size:11px;color:var(--t3);margin-top:5px}
.note-hint code{background:var(--s2);padding:1px 4px;border-radius:3px;font-size:11px}
.tags-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.tag{padding:2px 8px;border-radius:3px;font-size:11px;background:var(--s2);color:var(--t2)}

/* ── Person-Pill ── */
.person-pill{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--s1);border:1px solid var(--b1);border-radius:20px;
  padding:4px 10px 4px 5px;font-size:12px;cursor:pointer;transition:border-color .12s
}
.person-pill:hover{border-color:var(--b2)}
.person-av{
  width:22px;height:22px;border-radius:50%;background:var(--blue-bg);
  color:var(--blue);font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0
}

/* ── Modal ── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;
  align-items:center;justify-content:center;z-index:100;padding:1rem
}
.modal{
  background:var(--s0);border-radius:var(--rl);padding:1.4rem;width:100%;
  max-width:480px;max-height:92vh;overflow-y:auto;border:1px solid var(--b2);
  box-shadow:0 8px 36px rgba(0,0,0,.14)
}
.modal h2{font-size:15px;font-weight:600;margin-bottom:1rem;color:var(--t1)}
.form-row{margin-bottom:9px}
.form-row label{
  display:block;font-size:11px;color:var(--t2);margin-bottom:3px;
  text-transform:uppercase;letter-spacing:.4px;font-weight:600
}
.form-row input,.form-row select,.form-row textarea{
  width:100%;padding:7px 9px;border:1px solid var(--b1);border-radius:var(--r);
  font-size:13px;background:var(--s0);color:var(--t1);font-family:inherit;outline:none
}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--blue)}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:1.1rem;padding-top:.8rem;border-top:1px solid var(--b1)}
.divider{height:1px;background:var(--b1);margin:8px 0}
.hidden{display:none!important}

/* ── Toast ── */
.toast{
  position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);
  background:var(--t1);color:var(--bg);padding:8px 18px;border-radius:var(--r);
  font-size:13px;font-weight:500;z-index:300;opacity:0;transition:opacity .2s;
  pointer-events:none;white-space:nowrap
}
.toast.show{opacity:1}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--t3);font-size:13px}

@media(max-width:600px){
  .metrics{grid-template-columns:1fr 1fr}
  .form-2col{grid-template-columns:1fr}
  .main{padding:1rem .75rem}
  .topbar{padding:0 .75rem}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">Methoden<em>beratung</em><span style="font-size:11px;color:var(--t3);font-weight:500;margin-left:6px">v8.2</span></div>
  <nav class="nav">
    <button class="nav-btn active" onclick="go('dashboard')">Übersicht</button>
    <button class="nav-btn" onclick="go('heute')">Heute</button>
    <button class="nav-btn" onclick="go('faelle')">Fälle</button>
    <button class="nav-btn" onclick="go('kalender')">Kalender</button>
    <button class="nav-btn" onclick="go('statistik')">Statistik</button>
  </nav>
  <div class="topbar-right">
    <button class="btn btn-sm btn-primary" onclick="openSchnelleintrag()">+ Schnelleintrag</button>
    <button class="btn btn-sm" onclick="exportData()">↓ Export</button>
    <button class="btn btn-sm" onclick="document.getElementById('import-file').click()">↑ Import</button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(this)">
  </div>
</div>

<main class="main">

  <div class="metrics" id="metrics"></div>

  <!-- ÜBERSICHT (Dashboard) -->
  <div class="panel active" id="panel-dashboard">
    <div style="display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="openFallModal()">+ Neuer Fall</button>
      <button class="btn" onclick="openTerminModal()">+ Neuer Termin</button>
    </div>
    <div id="dash-deadlines" style="margin-bottom:10px"></div>
    <div class="dash-grid">
      <div>
        <div class="sec-hd"><div class="sec-title">Nächste Termine</div></div>
        <div id="dash-termine"></div>
      </div>
      <div>
        <div class="sec-hd"><div class="sec-title">Brauchen Aufmerksamkeit</div></div>
        <div id="dash-attention"></div>
      </div>
    </div>
  </div>

  <!-- HEUTE -->
  <div class="panel" id="panel-heute">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem">
      <div id="heute-label" style="font-size:16px;font-weight:600;color:var(--t1)"></div>
      <button class="btn btn-primary btn-sm" onclick="openTerminModal()">+ Termin</button>
    </div>
    <div id="heute-content"></div>
  </div>

  <!-- FÄLLE -->
  <div class="panel" id="panel-faelle">
    <div class="toolbar">
      <input class="search-inp" id="case-search" placeholder="Name, Projekttitel, Thema, Stichwort …" oninput="renderFaelle()">
      <select class="filter-sel" id="case-filter-qq" onchange="renderFaelle()">
        <option value="">Quant + Quali</option>
        <option value="quantitativ">Quantitativ</option>
        <option value="qualitativ">Qualitativ</option>
        <option value="gemischt">Gemischt</option>
      </select>
      <select class="filter-sel" id="case-filter-status" onchange="renderFaelle()">
        <option value="">Alle Status</option>
        <option value="neu">Neu</option>
        <option value="angefragt">Angefragt</option>
        <option value="terminiert">Terminiert</option>
        <option value="laufend">Laufend</option>
        <option value="wartet">Wartet auf Rückmeldung</option>
        <option value="abgeschlossen">Abgeschlossen</option>
      </select>
      <button class="btn btn-primary" onclick="openFallModal()">+ Neuer Fall</button>
    </div>
    <div id="case-list"></div>
  </div>

  <!-- DETAIL -->
  <div class="panel" id="panel-detail">
    <button class="back-btn" id="back-btn" onclick="goBack()">← Zurück</button>
    <div id="detail-content"></div>
  </div>

  <!-- KALENDER -->
  <div class="panel" id="panel-kalender">
    <div class="cal-nav">
      <button class="btn btn-sm" onclick="calMove(-1)">‹</button>
      <div class="cal-title" id="cal-title"></div>
      <button class="btn btn-sm" onclick="calMove(1)">›</button>
      <button class="btn btn-sm" onclick="calToday()" style="margin-left:4px">Heute</button>
    </div>
    <div class="cal-grid" id="cal-hdr"></div>
    <div class="cal-grid" id="cal-body" style="margin-top:3px"></div>
  </div>

  <!-- TAG-ANSICHT -->
  <div class="panel" id="panel-day">
    <button class="back-btn" onclick="go('kalender')">← Zurück</button>
    <div id="day-content"></div>
  </div>

  <!-- STATISTIK -->
  <div class="panel" id="panel-statistik">
    <div id="stats-content"></div>
  </div>

</main>

<div class="toast" id="toast"></div>

<!-- ── Modal: Schnelleintrag ─────────────────────────────────────────────── -->
<div class="overlay hidden" id="modal-schnell">
  <div class="modal" style="max-width:520px">
    <h2>Schnelleintrag</h2>

    <!-- Sektion 1: Person -->
    <div style="font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">Person</div>
    <div class="form-row">
      <label>Vorhandene Person wählen</label>
      <select id="sn-person-id" onchange="onSnPersonChange(this.value)">
        <option value="">– wählen –</option>
        <option value="__new__">+ Neue Person</option>
      </select>
    </div>
    <div id="sn-new-person-block" class="hidden">
      <div class="form-2col">

<script>
// ═══════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════
// Daten liegen in IndexedDB. Damit alle bestehenden, synchronen db.*/save.*-Aufrufe
// unverändert funktionieren, hält ein In-Memory-Cache (MEM) den aktuellen Stand;
// Schreibvorgänge werden asynchron nach IndexedDB persistiert.
const SK = { persons:'mb_persons', cases:'mb_cases', appts:'mb_appts' };
const SK_ALL = [SK.persons, SK.cases, SK.appts];
const IDB_NAME='methodenberatungDB', IDB_VERSION=1, IDB_STORE='data';

let _idb=null;        // gecachtes IDBDatabase-Handle
let _useIDB=true;     // false → Fallback auf localStorage (z.B. privater Modus)
const MEM={};         // In-Memory-Cache: Schlüssel → Array

function openIDB(){
  return new Promise((resolve,reject)=>{
    if(_idb){resolve(_idb);return;}
    if(!('indexedDB' in window)||!window.indexedDB){reject(new Error('IndexedDB nicht verfügbar'));return;}
    const req=indexedDB.open(IDB_NAME,IDB_VERSION);
    req.onupgradeneeded=e=>{
      const dbi=e.target.result;
      if(!dbi.objectStoreNames.contains(IDB_STORE)) dbi.createObjectStore(IDB_STORE);
    };
    req.onsuccess=e=>{_idb=e.target.result; resolve(_idb);};
    req.onerror=e=>reject(e.target.error);
  });
}
function idbGet(dbi,key){
  return new Promise((resolve,reject)=>{
    const req=dbi.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).get(key);
    req.onsuccess=e=>resolve(e.target.result);
    req.onerror=e=>reject(e.target.error);
  });
}
function idbPut(dbi,key,val){
  return new Promise((resolve,reject)=>{
    const req=dbi.transaction(IDB_STORE,'readwrite').objectStore(IDB_STORE).put(JSON.parse(JSON.stringify(val)),key);
    req.onsuccess=()=>resolve();
    req.onerror=e=>reject(e.target.error);
  });
}

// Defensiv parsen: ein korrupter localStorage-Eintrag soll nicht die ganze App crashen.
function lsLoad(key){
  try{
    const v=JSON.parse(localStorage.getItem(key)||'[]');
    return Array.isArray(v)?v:[];
  }catch(e){
    console.warn('Beschädigte Daten in',key,'– ignoriert.',e);
    return [];
  }
}

// Beim Start: IndexedDB öffnen, alle Schlüssel in den Cache laden, ggf. aus
// localStorage migrieren. Bei fehlender IndexedDB-Unterstützung Fallback auf localStorage.
async function loadDB(){
  try{
    const dbi=await openIDB();
    let migrated=false;
    for(const key of SK_ALL){
      let val=await idbGet(dbi,key);
      if(!Array.isArray(val)){
        if(localStorage.getItem(key)!==null){ val=lsLoad(key); await idbPut(dbi,key,val); migrated=true; }
        else val=[];
      }
      MEM[key]=val;
    }
    if(migrated){
      SK_ALL.forEach(k=>{try{localStorage.removeItem(k)}catch(e){}});
      console.info('Von localStorage zu IndexedDB migriert.');
    }
  }catch(e){
    console.warn('IndexedDB nicht verfügbar – nutze localStorage.',e);
    _useIDB=false;
    SK_ALL.forEach(k=>{MEM[k]=lsLoad(k);});
  }
}

// Synchrones Lesen aus dem Cache (alle bestehenden Aufrufe bleiben unverändert).
const db = {
  persons : () => Array.isArray(MEM[SK.persons])?MEM[SK.persons]:[],
  cases   : () => Array.isArray(MEM[SK.cases])  ?MEM[SK.cases]  :[],
  appts   : () => Array.isArray(MEM[SK.appts])  ?MEM[SK.appts]  :[],
};

// Synchron in den Cache schreiben + asynchron persistieren.
function persist(key,d){
  MEM[key]=d;
  if(_useIDB){
    openIDB().then(dbi=>idbPut(dbi,key,d)).catch(e=>{
      console.error('Speichern (IndexedDB) fehlgeschlagen für',key,e);
      try{ localStorage.setItem(key,JSON.stringify(d)); }
      catch(e2){ alert('Speichern fehlgeschlagen (Speicher voll oder gesperrt). Bitte ein Backup exportieren.'); }
    });
    return;
  }
  try{ localStorage.setItem(key,JSON.stringify(d)); }
  catch(e){ console.error('Speichern fehlgeschlagen für',key,e); alert('Speichern fehlgeschlagen (Speicher voll oder gesperrt). Bitte ein Backup exportieren.'); }
}
const save = {
  persons : d => persist(SK.persons,d),
  cases   : d => persist(SK.cases,d),
  appts   : d => persist(SK.appts,d),
};

// ═══════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════
const CASE_STATUS = {
  neu:          { label:'Neu',                   cls:'s-neu' },
  angefragt:    { label:'Angefragt',             cls:'s-angefragt' },
  terminiert:   { label:'Terminiert',            cls:'s-terminiert' },
  laufend:      { label:'Laufend',               cls:'s-laufend' },
  wartet:       { label:'Wartet auf Rückmeldung',cls:'s-wartet' },
  abgeschlossen:{ label:'Abgeschlossen',         cls:'s-abgeschlossen' },
};
const QQ = {
  quantitativ: { label:'Quantitativ', cls:'qq-quant' },
  qualitativ:  { label:'Qualitativ',  cls:'qq-quali' },
  gemischt:    { label:'Gemischt',    cls:'qq-gemischt' },
};
const APPT_STATUS = {
  geplant:  { label:'Geplant',  cls:'a-geplant' },
  erledigt: { label:'Erledigt', cls:'a-erledigt' },
  abgesagt: { label:'Abgesagt', cls:'a-abgesagt' },
};
const MONTHS  = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const MONTHSS = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
const WDAYS   = ['Mo','Di','Mi','Do','Fr','Sa','So'];

// ═══════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════
const uid     = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
// Zentrales HTML-Escaping gegen XSS. Escaped sowohl Text- als auch Attribut-Kontexte
// (beide Anführungszeichen), damit Nutzereingaben nie als HTML/Code interpretiert werden.
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
// Sichere Mini-Formatierung für Notizen: **fett**, *kursiv*, Zeilen mit "- "/"* " als
// Aufzählung, Zeilenumbrüche. Es wird ZUERST vollständig escaped (XSS-Schutz); erst danach
// werden ein paar wenige, sichere Muster in HTML übersetzt – beliebiges HTML bleibt neutralisiert.
function fmtNote(s){
  const inline = str => str
    .replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
  const out=[]; let list=null;
  esc(s).split(/\r?\n/).forEach(line=>{
    const m = line.match(/^\s*[-*]\s+(.+)$/);
    if(m){ (list = list || []).push('<li>'+inline(m[1])+'</li>'); }
    else {
      if(list){ out.push('<ul class="note-list">'+list.join('')+'</ul>'); list=null; }
      out.push(inline(line));
    }
  });
  if(list) out.push('<ul class="note-list">'+list.join('')+'</ul>');
  return out.join('<br>').replace(/<br>(<ul)/g,'$1').replace(/(<\/ul>)<br>/g,'$1');
}
const pad     = n  => n < 10 ? '0'+n : ''+n;
const today   = () => { const d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); };
const fmtDate = s  => {
  if(!s) return '–';
  const parts = s.split('-');
  if(parts.length!==3) return s;
  const y=parts[0], m=parseInt(parts[1],10), d=parseInt(parts[2],10);
  return pad(d)+'.'+pad(m)+'.'+y;
};
const addDays = (s,n) => { const d=new Date(s); d.setDate(d.getDate()+n); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); };
const initials = name => { const p=(name||'').split(/[\s,]+/).filter(Boolean); return ((p[0]||'')[0]||'').toUpperCase()+((p[1]||'')[0]||'').toUpperCase(); };
const nameInitials = name => {
  // "Anna Mehler" → "A. M."   "Müller, Jonas" → "M. J."
  const parts = (name||'').split(/[\s,]+/).filter(Boolean);
  return parts.map(p=>p[0].toUpperCase()+'.').join(' ');
};
const parseTags = s => (s||'').split(',').map(t=>t.trim()).filter(Boolean);
const daysUntil = s => s ? Math.round((new Date(s)-new Date(today()))/86400000) : null;
// Zeit-Helfer für Beginn/Ende ↔ Dauer
const timeToMin = t => { const [h,m]=String(t||'').split(':').map(Number); return (h||0)*60+(m||0); };
const minToTime = mins => { const m=((mins%1440)+1440)%1440; return pad(Math.floor(m/60))+':'+pad(m%60); };
// Dauer (min) hübsch: 180 → "3 Std", 90 → "1 Std 30 min", 45 → "45 min"
const fmtDur = mins => {
  const n=Number(mins)||0, h=Math.floor(n/60), m=n%60;
  if(h&&m) return `${h} Std ${m} min`;
  if(h)    return `${h} Std`;
  return `${m} min`;
};

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),2200);
}

function badge(text,cls){ return `<span class="badge ${cls}">${text}</span>`; }
function caseBadge(status){ const s=CASE_STATUS[status]||CASE_STATUS.neu; return badge(s.label,s.cls); }
function apptBadge(status){ const s=APPT_STATUS[status]||APPT_STATUS.geplant; return badge(s.label,s.cls); }
function qqBadge(qq){ const q=QQ[qq]; return q?badge(q.label,q.cls):''; }

function personForCase(c){ return db.persons().find(p=>p.id===c.personId)||null; }
function nameForCase(c){ const p=personForCase(c); return p?p.name:'?'; }
function labelForCase(c){ return `${nameForCase(c)} — ${c.titel||'kein Titel'}`; }

let currentTab = 'dashboard';
let detailBack = 'dashboard';

function go(tab){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  const btn = document.querySelector(`.nav-btn[onclick="go('${tab}')"]`);
  if(btn) btn.classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
  currentTab = tab;
  renderMetrics();
  if(tab==='dashboard') renderDashboard();
  if(tab==='heute')     renderHeute();
  if(tab==='faelle')    renderFaelle();
  if(tab==='kalender')  renderKal();
  if(tab==='statistik') renderStats();
}

function showDetail(fallId, back){
  detailBack = back || currentTab;
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-detail').classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  // highlight the source tab
  const btn = document.querySelector(`.nav-btn[onclick="go('${detailBack}')"]`);
  if(btn) btn.classList.add('active');
  renderDetail(fallId);
}

function goBack(){

}

function renderDashboard(){

  const nearDL = cases
    .filter(c=>{const d=daysUntil(c.deadline);return d!==null&&d>=0&&d<=7&&c.status!=='abgeschlossen';})
    .sort((a,b)=>a.deadline.localeCompare(b.deadline));
  document.getElementById('dash-deadlines').innerHTML = nearDL.map(c=>{
    const d=daysUntil(c.deadline);

      <span><strong>${esc(nameForCase(c))}</strong> · ${esc(c.titel)}</span>

function markAppt(id, status, back){
  const appts = db.appts();
  const i = appts.findIndex(x=>x.id===id); if(i<0) return;
  appts[i].status = status;
  save.appts(appts);

  if(status==='erledigt'){
    // Inline-Quick-Note zeigen, statt sofort neu zu rendern. Wichtig: die Suche muss
    // auf das auslösende Panel beschränkt sein – derselbe Termin wird (mit identischer
    // Element-ID) auch im Dashboard gerendert, sonst träfe getElementById das falsche Element.
    const scope = document.getElementById(`panel-${back}`) || document;
    const qnEl = scope.querySelector(`#qn-${id}`);
    if(qnEl){
      const plannedDur = Number(appts[i].dauer||0);
      qnEl.innerHTML=`<div class="quick-note-dur">
        <label for="qnd-${id}">Tatsächliche Dauer (min)</label>
        <input type="number" id="qnd-${id}" min="0" step="5" value="${plannedDur}">
      </div>
      <div class="quick-note-bar">
        <textarea rows="2" placeholder="Kurze Notiz zur Sitzung (optional) …" id="qnt-${id}"></textarea>
        <button class="btn btn-sm btn-primary" onclick="saveQuickNote('${id}','${back}')">Speichern</button>
        <button class="btn btn-sm btn-ghost" onclick="finishMark('${back}')">Überspringen</button>
      </div>`;
      // Balkenfarbe aktualisieren
      const bar = scope.querySelector(`#tl-${id} .tl-bar`);
      if(bar){ bar.className='tl-bar green'; }
      // Aktions-Buttons entfernen (die Aktions-Leiste liegt direkt vor dem Quick-Note-Container)
      const acts = qnEl.previousElementSibling;
      if(acts) acts.remove();
      return;
    }
  }
  renderMetrics();
  if(back==='heute') renderHeute();
  else if(back==='dashboard') renderDashboard();
  toast(status==='erledigt'?'Termin erledigt.':'Als abgesagt markiert.');
}

function saveQuickNote(apptId, back){
  const txt = (document.getElementById(`qnt-${apptId}`)?.value||'').trim();
  const durEl = document.getElementById(`qnd-${apptId}`);
  const dur = durEl ? parseInt(durEl.value,10) : NaN;
  const appts=db.appts();
  const i=appts.findIndex(x=>x.id===apptId);
  if(i>=0){
    if(txt) appts[i].notiz=txt;
    if(Number.isFinite(dur) && dur>0) appts[i].dauer=dur;
    save.appts(appts);
  }
  finishMark(back);
}

function finishMark(back){
  renderMetrics();
  if(back==='heute') renderHeute();
  else if(back==='dashboard') renderDashboard();
  toast('Gespeichert.');
}

  el.innerHTML=fp.map(c=>caseRowHtml(c,'faelle')).join('');

function inlineEdit(field, id){
  document.getElementById(`view-${field}-${id}`).style.display='none';
  document.getElementById(`edit-${field}-${id}`).style.display='';
  document.getElementById(`edit-btn-${field}-${id}`).style.display='none';
  const inp=document.getElementById(`inp-${field}-${id}`);
  if(inp){ inp.focus(); if(inp.tagName==='TEXTAREA'){ inp.selectionStart=inp.value.length; } }
}

function cancelInline(field, id){
  document.getElementById(`view-${field}-${id}`).style.display='';
  document.getElementById(`edit-${field}-${id}`).style.display='none';
  document.getElementById(`edit-btn-${field}-${id}`).style.display='';
}

function saveInline(field, id){
  const val = document.getElementById(`inp-${field}-${id}`).value.trim();
  const cases = db.cases();
  const i = cases.findIndex(x=>x.id===id); if(i<0) return;
  if(field==='next')      cases[i].naechsterSchritt = val;
  if(field==='notiz')     cases[i].notiz = val;
  if(field==='fragen')    cases[i].fragen = val;
  if(field==='abschluss') cases[i].abschlussnotiz = val;
  save.cases(cases);
  renderDetail(id);
  toast('Gespeichert.');
}

function changeStatus(id, val){
  if(!val) return;
  const cases=db.cases(), i=cases.findIndex(x=>x.id===id);
  if(i<0) return;
  cases[i].status=val;
  save.cases(cases);
  renderDetail(id);
  toast('Status geändert.');
}

function deleteFall(id){
  if(!confirm('Fall und alle Termine löschen?')) return;
  const c = db.cases().find(x=>x.id===id);
  const personId = c?.personId;
  save.cases(db.cases().filter(x=>x.id!==id));
  save.appts(db.appts().filter(a=>a.fallId!==id));
  // Wenn die Person keinen weiteren Fall hat, ebenfalls löschen
  if(personId){
    const remaining = db.cases().filter(x=>x.personId===personId);
    if(remaining.length===0){
      save.persons(db.persons().filter(p=>p.id!==personId));
    }
  }
  goBack(); toast('Fall gelöscht.');
}

function deleteTermin(tid, fallId){
  if(!confirm('Termin löschen?')) return;
  save.appts(db.appts().filter(a=>a.id!==tid));
  renderDetail(fallId); toast('Termin gelöscht.');
}

function saveFall(){
  const personId_raw = document.getElementById('f-person-id').value;
  const titel = document.getElementById('f-titel').value.trim();
  if(!titel){ alert('Bitte Projekttitel eingeben.'); return; }

  const persons = db.persons();
  let personId = personId_raw;

  if(personId_raw==='__new__'){
    const name=document.getElementById('np-name').value.trim();
    if(!name){ alert('Bitte Name eingeben.'); return; }
    const newP={ id:uid(), name, studiengang:document.getElementById('np-stg').value.trim(),
                 email:document.getElementById('np-email').value.trim() };
    persons.push(newP); save.persons(persons);
    personId=newP.id;
  } else if(!personId_raw){
    alert('Bitte eine Person wählen oder neu anlegen.'); return;
  }

  const editId = document.getElementById('f-edit-id').value;
  const cases  = db.cases();
  const data = {
    personId, titel,
    qq:            (document.querySelector('input[name="f-qq"]:checked')?.value)||'',
    typ:           document.getElementById('f-typ').value,
    software:      document.getElementById('f-software').value,
    fragen:        document.getElementById('f-fragen').value.trim(),
    tags:          parseTags(document.getElementById('f-tags').value),
    datenstatus:   document.getElementById('f-datenstatus').value,
    deadline:      document.getElementById('f-deadline').value,
    status:        document.getElementById('f-status').value,
    prioritaet:    document.getElementById('f-prio').value,
  };

  if(editId){
    const i=cases.findIndex(x=>x.id===editId);
    if(i>=0) cases[i]={...cases[i],...data};
    save.cases(cases);
    closeModal('modal-fall');
    renderDetail(editId);
    toast('Fall aktualisiert.');
  } else {
    cases.push({id:uid(),erstelltAm:today(),...data});
    save.cases(cases);
    closeModal('modal-fall');
    renderMetrics();
    if(currentTab==='dashboard') renderDashboard();
    else if(currentTab==='faelle') renderFaelle();
    else renderDashboard();
    toast('Fall gespeichert.');
  }
}

// Dauer-Hinweis im Termin-Formular aus Beginn/Ende ableiten
function onTimeChange(){
  const start=document.getElementById('t-uhrzeit').value;
  const ende =document.getElementById('t-ende').value;
  const hint=document.getElementById('t-dauer-hint');
  if(!start||!ende){ hint.textContent='Dauer: –'; hint.style.color='var(--t3)'; return; }
  const d=timeToMin(ende)-timeToMin(start);
  if(d<=0){ hint.textContent='Ende muss nach Beginn liegen'; hint.style.color='var(--red)'; }
  else    { hint.textContent='Dauer: '+fmtDur(d); hint.style.color='var(--t3)'; }
}

function openTerminEdit(id){
  const a=db.appts().find(x=>x.id===id); if(!a) return;
  document.getElementById('modal-termin-h').textContent='Termin bearbeiten';
  populateFallSelect(a.fallId);
  document.getElementById('t-datum').value=a.datum;
  document.getElementById('t-uhrzeit').value=a.uhrzeit;
  document.getElementById('t-ende').value=minToTime(timeToMin(a.uhrzeit)+Number(a.dauer||0));
  onTimeChange();
  document.getElementById('t-format').value=a.format;
  document.getElementById('t-art').value=a.art;
  document.getElementById('t-status').value=a.status;
  document.getElementById('t-notiz').value=a.notiz||'';
  document.getElementById('t-edit-id').value=id;
  document.getElementById('modal-termin').classList.remove('hidden');
}

function saveTermin(){
  const fallId=document.getElementById('t-fall-id').value;
  const datum=document.getElementById('t-datum').value;
  if(!fallId){ alert('Bitte einen Fall wählen.'); return; }
  if(!datum){ alert('Bitte Datum wählen.'); return; }
  const start=document.getElementById('t-uhrzeit').value;
  const ende =document.getElementById('t-ende').value;
  const dauer=timeToMin(ende)-timeToMin(start);
  if(!start||!ende){ alert('Bitte Beginn und Ende angeben.'); return; }
  if(dauer<=0){ alert('Die Endzeit muss nach der Beginnzeit liegen.'); return; }
  const editId=document.getElementById('t-edit-id').value;
  const appts=db.appts();
  const data={
    fallId,datum,
    uhrzeit:start,
    dauer:  dauer,
    format: document.getElementById('t-format').value,
    art:    document.getElementById('t-art').value,
    status: document.getElementById('t-status').value,
    notiz:  document.getElementById('t-notiz').value.trim(),
  };
  if(editId){
    const i=appts.findIndex(x=>x.id===editId); if(i>=0) appts[i]={...appts[i],...data};
  } else {
    appts.push({id:uid(),...data});
  }
  save.appts(appts);
  closeModal('modal-termin');
  renderMetrics();
  if(document.getElementById('panel-detail').classList.contains('active')) renderDetail(fallId);
  else if(currentTab==='heute') renderHeute();
  else if(currentTab==='dashboard') renderDashboard();
  else if(currentTab==='kalender') renderKal();
  toast(editId?'Termin aktualisiert.':'Termin gespeichert.');
}

let calY=new Date().getFullYear(), calM=new Date().getMonth();

function renderKal(){
  document.getElementById('cal-title').textContent=MONTHS[calM]+' '+calY;
  document.getElementById('cal-hdr').innerHTML=WDAYS.map(d=>`<div class="cal-hdr">${d}</div>`).join('');
  const appts=db.appts(), tmap={};
  appts.forEach(a=>{(tmap[a.datum]=tmap[a.datum]||[]).push(a);});
  let dow=new Date(calY,calM,1).getDay(); dow=dow===0?6:dow-1;
  const dim=new Date(calY,calM+1,0).getDate();
  const dip=new Date(calY,calM,0).getDate();
  const t=today();
  let cells='';
  for(let i=0;i<dow;i++)
    cells+=`<div class="cal-day other-month"><div class="cal-day-num">${dip-dow+1+i}</div></div>`;
  for(let d=1;d<=dim;d++){
    const key=calY+'-'+pad(calM+1)+'-'+pad(d);
    const list=tmap[key]||[];
    const isT=key===t;
    const dots=list.slice(0,5).map(a=>{
      const col=a.status==='erledigt'?'var(--green)':a.status==='abgesagt'?'var(--red)':'var(--blue)';
      return`<span class="cal-dot" style="background:${col}"></span>`;
    }).join('');
    cells+=`<div class="cal-day${isT?' today':''}" data-key="${key}">
      <div class="cal-day-num">${d}</div>
      <div style="margin-top:3px">${dots}</div>
    </div>`;
  }
  const rem=(7-(dow+dim)%7)%7;
  for(let d=1;d<=rem;d++)
    cells+=`<div class="cal-day other-month"><div class="cal-day-num">${d}</div></div>`;
  document.getElementById('cal-body').innerHTML=cells;
  document.querySelectorAll('#cal-body .cal-day:not(.other-month)').forEach(el=>{
    el.addEventListener('click',()=>showDay(el.dataset.key));
  });
}

function calMove(dir){
  calM+=dir; if(calM>11){calM=0;calY++;} else if(calM<0){calM=11;calY--;} renderKal();
}
function calToday(){ const n=new Date(); calY=n.getFullYear(); calM=n.getMonth(); renderKal(); }

function showDay(key){
  const [y,m,d]=key.split('-');
  const label=`${parseInt(d)}. ${MONTHS[parseInt(m)-1]} ${y}`;
  const appts=db.appts().filter(a=>a.datum===key).sort((a,b)=>a.uhrzeit.localeCompare(b.uhrzeit));
  const cases=db.cases();

  let html=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem">
    <div style="font-size:16px;font-weight:600">${label}</div>
    <button class="btn btn-primary btn-sm" onclick="openTerminModalDate('${key}')">+ Termin</button>
  </div>`;

  html += appts.length
    ? `<div class="tl-wrap">${appts.map(a=>{
        const c=cases.find(x=>x.id===a.fallId);
        const fmtLabel={online:'Online',praesent:'Präsenz',telefonisch:'Telefonisch'}[a.format]||a.format;
        return`<div class="tl-item">
          <div class="tl-time"><div class="tl-time-h">${a.uhrzeit}</div></div>
          <div class="tl-bar ${a.status==='erledigt'?'green':a.status==='abgesagt'?'red':'blue'}"></div>
          <div class="tl-card" onclick="${c?`showDetail('${c.id}','kalender')`:''}">
            <div class="tl-card-name">${c?esc(nameForCase(c)):'?'}</div>
            <div class="tl-card-meta">
              <span>${esc(a.art)}</span>${badge(esc(fmtLabel),'f-'+esc(a.format))}<span>${fmtDur(a.dauer)}</span>${apptBadge(a.status)}
            </div>
            ${c?`<div style="font-size:11px;color:var(--t3);margin-top:2px">${esc(c.titel)}</div>`:''}
          </div>
        </div>`;
      }).join('')}</div>`
    : `<div class="empty">Keine Termine an diesem Tag.</div>`;

  document.getElementById('day-content').innerHTML=html;
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-day').classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.nav-btn[onclick="go('kalender')"]`).classList.add('active');
}

function openTerminModalDate(date){
  openTerminModal();
  document.getElementById('t-datum').value=date;
}

// STATISTIK
// ═══════════════════════════════════════════════════
function renderStats(){
  const cases  = db.cases();
  const appts  = db.appts();
  const persons = db.persons();

  const done    = appts.filter(a=>a.status==='erledigt');
  const total   = done.length;
  const totalMin= done.reduce((s,a)=>s+Number(a.dauer||0),0);
  const totalH  = Math.floor(totalMin/60);
  const totalM  = totalMin%60;

  // Fälle gesamt / offen / abgeschlossen
  const cAll  = cases.length;
  const cOpen = cases.filter(c=>c.status!=='abgeschlossen').length;
  const cDone = cases.filter(c=>c.status==='abgeschlossen').length;

  // Qual/Quant Aufschlüsselung
  const qqCount = {quantitativ:0, qualitativ:0, gemischt:0};
  cases.forEach(c=>{if(qqCount[c.qq]!==undefined)qqCount[c.qq]++;});

  // Durchschnittliche Sitzungen pro Fall
  const fallAppts = cases.map(c=>done.filter(a=>a.fallId===c.id).length);
  const avgSess   = cAll>0?(fallAppts.reduce((s,n)=>s+n,0)/cAll).toFixed(1):0;

  // Wiederholungsrate: wie viele Personen kamen 1x, 2x, 3x, 4+x
  const sessPerPerson = {};
  cases.forEach(c=>{
    const pid = c.personId;
    const n   = done.filter(a=>a.fallId===c.id).length;
    sessPerPerson[pid] = (sessPerPerson[pid]||0) + n;
  });
  const repBuckets = {1:0,2:0,3:0,'4+':0};
  Object.values(sessPerPerson).forEach(n=>{
    if(n===1) repBuckets[1]++;
    else if(n===2) repBuckets[2]++;
    else if(n===3) repBuckets[3]++;
    else if(n>=4)  repBuckets['4+']++;
  });

  // Software
  const swCount = {};
  cases.forEach(c=>{ if(c.software){swCount[c.software]=(swCount[c.software]||0)+1;} });
  const swData = Object.entries(swCount).sort((a,b)=>b[1]-a[1]);
  const maxSw  = Math.max(...swData.map(x=>x[1]),1);

  // Tags (häufigste) — Thema fließt nicht mehr in die Statistik ein
  const topicCount = {};
  cases.forEach(c=>{
    (c.tags||[]).forEach(t=>{ topicCount[t]=(topicCount[t]||0)+1; });
  });
  const topicData = Object.entries(topicCount).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const maxTopic  = Math.max(...topicData.map(x=>x[1]),1);

  // Sitzungen pro Monat (letzte 6 Monate)
  const monthly=[];
  for(let i=5;i>=0;i--){
    const d=new Date(); d.setMonth(d.getMonth()-i);
    const y=d.getFullYear(), m=d.getMonth();
    const n=done.filter(a=>{
      const[ay,am]=a.datum.split('-');
      return parseInt(ay)===y&&parseInt(am)-1===m;
    }).length;
    monthly.push([MONTHSS[m],n]);
  }
  const maxMo=Math.max(...monthly.map(x=>x[1]),1);

  // Sitzungsminuten nach Software
  const swMin={};
  done.forEach(a=>{
    const c=cases.find(x=>x.id===a.fallId);
    const sw=c?.software||'–';
    swMin[sw]=(swMin[sw]||0)+Number(a.dauer||0);
  });
  const swMinData=Object.entries(swMin).sort((a,b)=>b[1]-a[1]);
  const maxSwMin=Math.max(...swMinData.map(x=>x[1]),1);

  function bars(data, maxVal, color){
    if(!data.length) return`<div style="color:var(--t3);font-size:13px">Keine Daten.</div>`;
    return data.map(([label,val])=>`
      <div class="bar-row">
        <div class="bar-lbl" title="${esc(label)}">${esc(label)}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(val/maxVal*100)}%;background:${color}"></div></div>
        <div class="bar-num">${val}</div>
      </div>`).join('');
  }

  // Export-CSV
  function csvExport(){
    const rows=[['Kürzel','Studiengang','Projekttitel','Typ','Beratungsart','Software','Fragen','Status','Sitzungen erledigt','Gesamtminuten','Deadline']];
    cases.forEach(c=>{
      const p=personForCase(c);
      const sess=done.filter(a=>a.fallId===c.id);
      rows.push([
        p?nameInitials(p.name):'',
        p?.studiengang||'',c.titel||'',c.typ||'',c.qq||'',
        c.software||'',c.fragen||'',c.status||'',
        sess.length,sess.reduce((s,a)=>s+Number(a.dauer||0),0),c.deadline||''
      ]);
    });
    const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(';')).join('\n');
    const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=`methodenberatung-bericht-${today()}.csv`;
    a.click(); URL.revokeObjectURL(url);
    toast('CSV exportiert.');
  }
  window._csvExport=csvExport;

  document.getElementById('stats-content').innerHTML=`
    <!-- Kopfzeile mit Export -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px">
      <div style="font-size:15px;font-weight:600;color:var(--t1)">Beratungsstatistik</div>
      <button class="btn btn-sm" onclick="window._csvExport()">↓ CSV-Export</button>
    </div>

    <!-- Kennzahlen oben -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:1.25rem">
      <div class="stat-card"><div class="stat-big">${cAll}</div><div class="stat-sub">Fälle gesamt</div><div style="font-size:11px;color:var(--t3);margin-top:3px">${cOpen} offen · ${cDone} abgeschlossen</div></div>
      <div class="stat-card"><div class="stat-big">${total}</div><div class="stat-sub">Sitzungen gesamt</div><div style="font-size:11px;color:var(--t3);margin-top:3px">Ø ${avgSess} pro Fall</div></div>
      <div class="stat-card"><div class="stat-big">${totalH}h ${totalM>0?totalM+'min':''}</div><div class="stat-sub">Beratungszeit gesamt</div></div>
      <div class="stat-card">
        <div style="display:flex;flex-direction:column;gap:5px">
          <div style="display:flex;align-items:center;justify-content:space-between">
            ${qqBadge('quantitativ')}<span style="font-size:16px;font-weight:700">${qqCount.quantitativ}</span>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between">
            ${qqBadge('qualitativ')}<span style="font-size:16px;font-weight:700">${qqCount.qualitativ}</span>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between">
            ${qqBadge('gemischt')}<span style="font-size:16px;font-weight:700">${qqCount.gemischt}</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Charts 2-col -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-card-title">Sitzungen pro Monat</div>
        ${bars(monthly,maxMo,'var(--blue)')}
      </div>
      <div class="stat-card">
        <div class="stat-card-title">Wiederholungen (Sitzungen pro Person)</div>
        ${Object.entries(repBuckets).map(([k,v])=>`
          <div class="rep-row">
            <span style="color:var(--t2)">${k==='4+'?'4 oder mehr':k} Sitzung${k==='1'?'':'en'}</span>
            <span style="font-weight:600;color:var(--t1)">${v} Person${v!==1?'en':''}</span>
          </div>`).join('')}
        <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--b1);font-size:12px;color:var(--t2)">
          Personen mit Folgeterminen: <strong>${Object.entries(repBuckets).filter(([k])=>k!=='1').reduce((s,[,v])=>s+v,0)}</strong>
          von ${Object.values(repBuckets).reduce((s,v)=>s+v,0)} gesamt
        </div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-card-title">Häufige Stichwörter (Tags)</div>
        ${topicData.length?bars(topicData,maxTopic,'var(--purple)'):`<div style="color:var(--t3);font-size:13px">Noch keine Stichwörter erfasst.</div>`}
        ${topicData.length?`<div style="margin-top:8px;font-size:11px;color:var(--t3)">Basis für Workshop-Planung</div>`:''}
      </div>
      <div class="stat-card">
        <div class="stat-card-title">Software-Nutzung (Fälle)</div>
        ${bars(swData,maxSw,'var(--teal)')}
        <div class="stat-card-title" style="margin-top:14px">Beratungsminuten nach Software</div>
        ${bars(swMinData.map(([k,v])=>[k,Math.round(v/60)+'h'+(v%60>0?' '+(v%60)+'min':'')])
               .map(([k,v],i)=>[k,swMinData[i][1]]),maxSwMin,'var(--green)')}
      </div>
    </div>`;
}

function exportData(){
  const payload={version:4,exportedAt:new Date().toISOString(),
    persons:db.persons(),cases:db.cases(),appts:db.appts()};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`methodenberatung-${today()}.json`;
  a.click(); URL.revokeObjectURL(url);
  toast('Backup gespeichert.');
}

function importData(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(!d||typeof d!=='object'||!Array.isArray(d.cases)){ alert('Ungültige Datei.'); input.value=''; return; }
      const persons=Array.isArray(d.persons)?d.persons:[];
      const appts=Array.isArray(d.appts)?d.appts:[];
      const s=`${persons.length} Personen, ${d.cases.length} Fälle, ${appts.length} Termine`;
      if(!confirm(`Backup laden?\n\n${s}\n\n⚠ Bestehende Daten werden überschrieben.`)){input.value='';return;}
      save.persons(persons); save.cases(d.cases); save.appts(appts);
      input.value='';
      go('dashboard');
      toast('Backup geladen.');
    }catch{ alert('Fehler beim Lesen.'); input.value=''; }
  };
  reader.readAsText(file);
}

function onSnPersonChange(val){
  document.getElementById('sn-new-person-block').classList.toggle('hidden', val!=='__new__');
}

function onSnTimeChange(){
  const start = document.getElementById('sn-uhrzeit').value;
  const ende  = document.getElementById('sn-ende').value;
  const hint  = document.getElementById('sn-dauer-hint');
  if(!start||!ende){ hint.textContent='Dauer: –'; return; }
  const d = timeToMin(ende)-timeToMin(start);
  hint.textContent = d>0 ? 'Dauer: '+fmtDur(d) : 'Ende muss nach Beginn liegen';
  hint.style.color = d>0 ? 'var(--t3)' : 'var(--red)';
}

function saveSchnelleintrag(){
  const titel = document.getElementById('sn-titel').value.trim();
  if(!titel){ alert('Bitte Projekttitel eingeben.'); return; }

  // Person
  const persons = db.persons();
  const personVal = document.getElementById('sn-person-id').value;
  let personId = personVal;
  if(personVal==='__new__'){
    const name = document.getElementById('sn-name').value.trim();
    if(!name){ alert('Bitte Name eingeben.'); return; }
    const newP = { id:uid(), name,
      studiengang: document.getElementById('sn-stg').value.trim(),
      email: document.getElementById('sn-email').value.trim() };
    persons.push(newP); save.persons(persons);
    personId = newP.id;
  } else if(!personVal){
    alert('Bitte eine Person wählen oder neu anlegen.'); return;
  }

  // Fall
  const cases = db.cases();
  const fallId = uid();
  const start = document.getElementById('sn-uhrzeit').value;
  const ende  = document.getElementById('sn-ende').value;
  const dauer = timeToMin(ende)-timeToMin(start);
  if(dauer<=0){ alert('Ende muss nach Beginn liegen.'); return; }

  cases.push({
    id: fallId, erstelltAm: today(), personId, titel,
    qq:          document.querySelector('input[name="sn-qq"]:checked')?.value||'',
    typ:         document.getElementById('sn-typ').value,
    software:    document.getElementById('sn-software').value,
    fragen:      '',
    tags:        parseTags(document.getElementById('sn-tags').value),
    datenstatus: 'Keine Daten',
    deadline:    '',
    status:      'laufend',
    prioritaet:  'normal',
    naechsterSchritt:'', notiz:'', abschlussnotiz:''
  });
  save.cases(cases);

  // Termin
  const appts = db.appts();
  appts.push({
    id: uid(), fallId,
    datum:   document.getElementById('sn-datum').value,
    uhrzeit: start,
    dauer,
    format:  document.getElementById('sn-format').value,
    art:     document.getElementById('sn-art').value,
    status:  document.getElementById('sn-status').value,
    notiz:   ''
  });
  save.appts(appts);

  closeModal('modal-schnell');
  renderMetrics();
  if(currentTab==='dashboard') renderDashboard();
  else if(currentTab==='faelle') renderFaelle();
  else renderDashboard();
  toast('Person, Fall & Termin gespeichert.');
}

function toggleEmailPaste(){
  const block = document.getElementById('email-paste-block');
  const arrow = document.getElementById('email-paste-arrow');
  const open  = block.style.display === 'none';
  block.style.display = open ? 'block' : 'none';
  arrow.textContent   = open ? '▲' : '▼';
  // Wenn geschlossen: Spickzettel auch wegräumen
  if(!open) hideEmailSpickzettel();
}

function showEmailSpickzettel(){
  const raw = document.getElementById('email-paste-text').value.trim();
  if(!raw){ alert('Bitte zuerst den E-Mail-Text einfügen.'); return; }

  // Text bereinigen: >-Zitate, *Markdown*, führende Leerzeichen
  const cleaned = raw
    .split('\n')
    .map(l => l.replace(/^>\s?/, '').replace(/\*{1,2}([^*]+)\*{1,2}/g,'$1').trimEnd())
    .join('\n')
    .replace(/\n{3,}/g, '\n\n')
    .trim();

  // Tag-Kandidaten: vordefinierte Keywords + alle bereits genutzten Tags aus DB
  const FIXED_KW = [
    'Regression','Multiple Regression','Logistische Regression','Beta-Regression',
    'Ordinale Regression','Poisson-Regression','ANOVA','MANOVA','t-Test','Chi-Quadrat',
    'Korrelation','SEM','Strukturgleichungsmodell','Pfadmodell','Mediation',
    'Mediationsanalyse','Moderation','Moderationsanalyse','Interaktion','Simple Slopes',
    'Faktorenanalyse','EFA','CFA','Reliabilität','Cronbach','Poweranalyse','Effektgröße',
    'fehlende Werte','FIML','Multiple Imputation','Längsschnitt','Querschnitt',
    'Latent Growth','Mixed Model','Multilevel','Hierarchisch','Bootstrap',
    'Clusteranalyse','Diskriminanzanalyse','Kovarianzanalyse','Varianzaufklärung',
    'Inhaltsanalyse','Grounded Theory','Thematische Analyse','Interview','Kodierung',
    'MAXQDA','Deskriptivstatistik','Normalverteilung','Ausreißer','Transformation',
    'Dummy-Variable','Interaktionsterm','Kovariable','Stichprobengröße','Fragebogen',
    'Skalenkonstruktion','Itemanalyse','Messinvarianz','Konfirmatorisch'
  ];

  // Bereits genutzte Tags aus der DB
  const dbTags = [...new Set(db.cases().flatMap(c=>c.tags||[]))];
  const allCandidates = [...new Set([...FIXED_KW, ...dbTags])];

  // Gegen den bereinigten Text matchen
  const rawLower = cleaned.toLowerCase();
  const matched = allCandidates.filter(kw => rawLower.includes(kw.toLowerCase()));

  // Aktuell bereits gesetzte Tags
  const currentTags = () => parseTags(document.getElementById('f-tags').value);

  // Spickzettel-Panel erzeugen oder aktualisieren
  let panel = document.getElementById('spick-panel');
  if(!panel){
    panel = document.createElement('div');
    panel.id = 'spick-panel';
    const modalInner = document.getElementById('modal-fall-inner');
    modalInner.style.maxWidth = '860px';
    modalInner.style.display  = 'grid';
    modalInner.style.gridTemplateColumns = '1fr 1fr';
    modalInner.style.gap = '16px';
    modalInner.style.alignItems = 'start';

    const formWrap = document.createElement('div');
    formWrap.id = 'fall-form-wrap';
    const children = [...modalInner.children];
    const h2 = modalInner.querySelector('h2');
    children.forEach(child => {
      if(child !== h2) formWrap.appendChild(child);
    });

    panel.style.cssText = 'overflow-y:auto;max-height:80vh;padding-right:12px;border-right:1px solid var(--b1)';
    modalInner.appendChild(panel);
    modalInner.appendChild(formWrap);
    h2.style.gridColumn = '1 / -1';
    modalInner.insertBefore(h2, modalInner.firstChild);
  }

  // Tag-Chip-HTML — aktive Tags hervorgehoben
  function renderChips(){
    const active = currentTags();
    if(!matched.length) return `<div style="font-size:12px;color:var(--t3)">Keine passenden Stichwörter gefunden.</div>`;
    return matched.map(kw=>{
      const isActive = active.some(t=>t.toLowerCase()===kw.toLowerCase());
      return `<span class="tag-chip" data-kw="${esc(kw)}" style="
        display:inline-block;padding:3px 9px;border-radius:3px;font-size:11px;
        cursor:pointer;margin:2px;border:1px solid ${isActive?'var(--blue)':'var(--b2)'};
        background:${isActive?'var(--blue-bg)':'var(--s1)'};
        color:${isActive?'var(--blue)':'var(--t2)'};
        font-weight:${isActive?'600':'400'};
        transition:all .12s">${esc(kw)}${isActive?' ✓':''}</span>`;
    }).join('');
  }

  panel.innerHTML = `
    <div style="font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px">E-Mail</div>
    <div style="font-size:12px;color:var(--t2);line-height:1.7;white-space:pre-wrap;word-break:break-word;margin-bottom:14px">${esc(cleaned)}</div>
    ${matched.length?`
    <div style="font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">Erkannte Stichwörter</div>
    <div id="tag-chips">${renderChips()}</div>
    <div style="font-size:11px;color:var(--t3);margin-top:6px">Klick = Tag hinzufügen / entfernen</div>`:''}`;

  // Event-Delegation: ein Listener auf dem Panel, kein inline-onclick
  panel.addEventListener('click', e=>{
    const chip = e.target.closest('.tag-chip');
    if(!chip) return;
    toggleTagChip(chip.dataset.kw);
  });
}

function toggleTagChip(kw){
  const inp = document.getElementById('f-tags');
  let tags = parseTags(inp.value);
  const idx = tags.findIndex(t=>t.toLowerCase()===kw.toLowerCase());
  if(idx>=0) tags.splice(idx,1);
  else tags.push(kw);
  inp.value = tags.join(', ');
  // Chips neu rendern
  const el = document.getElementById('tag-chips');
  if(el){
    const active = parseTags(inp.value);
    el.querySelectorAll('.tag-chip').forEach(chip=>{
      const isActive = active.some(t=>t.toLowerCase()===chip.dataset.kw.toLowerCase());
      chip.style.border    = `1px solid ${isActive?'var(--blue)':'var(--b2)'}`;
      chip.style.background= isActive?'var(--blue-bg)':'var(--s1)';
      chip.style.color     = isActive?'var(--blue)':'var(--t2)';
      chip.style.fontWeight= isActive?'600':'400';
      chip.textContent     = chip.dataset.kw + (isActive?' ✓':'');
    });
  }
}

function hideEmailSpickzettel(){
  const panel = document.getElementById('spick-panel');
  if(!panel) return;
  const modalInner = document.getElementById('modal-fall-inner');
  const formWrap   = document.getElementById('fall-form-wrap');

  // Formular-Kinder zurück in modalInner
  if(formWrap){
    [...formWrap.children].forEach(child => modalInner.appendChild(child));
    formWrap.remove();
  }
  panel.remove();

  // Modal zurück auf normale Breite
  modalInner.style.maxWidth      = '480px';
  modalInner.style.display       = '';
  modalInner.style.gridTemplateColumns = '';
  modalInner.style.gap           = '';
  const h2 = modalInner.querySelector('h2');
  if(h2) h2.style.gridColumn = '';
}
